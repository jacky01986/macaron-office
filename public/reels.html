<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<title>🎬 RINA 短影音企劃 · 溫點 WarmPlace</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root{ --burgundy:#6D2E46; --burgundy-dark:#4a1f30; --gold:#B08D57; --dark:#1C1213; --dark-2:#2a1a1d; --ivory:#FCF6F5; --green:#3fb27f; }
  *{ box-sizing:border-box; }
  body{ font-family:-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif; background:var(--dark); color:var(--ivory); margin:0; padding:0 0 60px; }
  .wrap{ padding:18px; max-width:920px; margin:0 auto; }
  h1{ font-size:22px; margin:0 0 4px; color:var(--gold); }
  .sub{ color:rgba(252,246,245,.7); font-size:13px; margin-bottom:18px; }
  .card{ background:var(--dark-2); border:1px solid rgba(176,141,87,.3); border-radius:12px; padding:16px; margin-bottom:16px; }
  .intel-pill{ display:inline-block; padding:4px 10px; border-radius:12px; font-size:12px; background:rgba(63,178,127,.15); color:var(--green); border:1px solid rgba(63,178,127,.4); }
  .intel-pill.warn{ background:rgba(176,141,87,.15); color:var(--gold); border-color:rgba(176,141,87,.4); }
  label{ display:block; font-size:13px; margin:10px 0 4px; color:rgba(252,246,245,.85); }
  textarea,select{ width:100%; background:var(--dark); border:1px solid var(--burgundy); color:var(--ivory); border-radius:6px; padding:9px 10px; font-size:14px; font-family:inherit; }
  textarea{ min-height:64px; resize:vertical; }
  .row{ display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; }
  .row > div{ flex:1; min-width:140px; }
  button.go{ background:linear-gradient(135deg,var(--burgundy),var(--burgundy-dark)); color:var(--ivory); border:1px solid var(--gold); padding:11px 22px; border-radius:8px; font-size:15px; font-weight:700; cursor:pointer; }
  button.go:disabled{ opacity:.5; cursor:not-allowed; }
  #status{ font-size:13px; margin:12px 0; color:var(--gold); }
  #out{ font-size:14px; line-height:1.7; }
  #out h4{ color:var(--gold); border-bottom:1px solid rgba(176,141,87,.3); padding-bottom:6px; margin:22px 0 10px; }
  #out ol{ padding-left:20px; }
  #out p{ margin:6px 0; }
  #out strong{ color:var(--gold); }
  .empty{ color:rgba(252,246,245,.5); text-align:center; padding:24px; }
</style>
<link rel="stylesheet" href="/macaron-shared.css">
</head>
<body>
<style>@media all { .macaron-topnav.in-iframe { display:none !important; } }</style>
<script>
(function(){ try{ if(window.parent!==window){ var n=document.querySelector('.macaron-topnav'); if(n)n.classList.add('in-iframe'); else document.addEventListener('DOMContentLoaded',function(){var x=document.querySelector('.macaron-topnav'); if(x)x.classList.add('in-iframe');}); } }catch(e){} })();
</script>
<style>
.macaron-topnav{ background:linear-gradient(135deg,#6B4226,#8B5A33); padding:8px 16px; display:flex; gap:8px; align-items:center; overflow-x:auto; white-space:nowrap; }
.macaron-topnav strong{ color:#FAF7F2; font-size:14px; margin-right:8px; }
.macaron-topnav a{ padding:6px 12px; border-radius:6px; text-decoration:none; font-size:13px; font-weight:600; background:#FAF7F2; color:#6B4226; }
</style>
<div class="macaron-topnav">
  <strong>溫點 WarmPlace</strong>
  <a href="/">🏠 主控台</a>
  <a href="/content-hub.html">📚 內容中心</a>
  <a href="/customer-hub.html">👥 客戶中心</a>
  <a href="/ads-hub.html">📊 廣告中心</a>
  <a href="/market-intel.html">🔍 市場情報</a>
  <a href="/teachers.html">🏪 門店戰報</a>
  <a href="/guide.html">📖 使用說明</a>
</div>

<div class="wrap">
  <h1>🎬 RINA 短影音企劃</h1>
  <p class="sub">RINA = AI 短影音導演。她讀 SCOUT 全球市場調查 → 產出「立刻可拍」的 Reels 行動建議（含分鏡 / 拍攝企劃 / 節奏配樂）。</p>

  <div class="card">
    <div id="intel-status"><span class="intel-pill warn">⏳ 檢查 SCOUT 情報中…</span></div>
    <div class="row" style="margin-top:14px;">
      <div style="max-width:140px;">
        <label>要幾支企劃</label>
        <select id="count">
          <option value="3">3 支</option>
          <option value="2">2 支</option>
          <option value="1">1 支</option>
          <option value="4">4 支</option>
          <option value="5">5 支</option>
        </select>
      </div>
      <div>
        <label>額外要求（可留空 — 留空就讓 RINA 依市場調查自由發揮）</label>
        <textarea id="brief" placeholder="例：這週主打母親節，想要催淚一點 / 或：幫我想企業送禮的 Reels"></textarea>
      </div>
    </div>
    <div style="margin-top:14px;">
      <button class="go" id="go" onclick="run()">🎬 RINA 開始企劃</button>
    </div>
  </div>

  <div id="status"></div>
  <div class="card" id="result" style="display:none;">
    <div id="out"></div>
  </div>
</div>

<script>
function $(id){ return document.getElementById(id); }

async function checkIntel(){
  try{
    const j = await fetch('/api/reels/intel').then(r=>r.json());
    const el = $('intel-status');
    if(j.has_intel){
      el.innerHTML = '<span class="intel-pill">✅ 已連上 SCOUT 全球市場情報'+(j.scout_run?'（'+String(j.scout_run).slice(0,10)+'）':'')+'</span>';
    }else{
      el.innerHTML = '<span class="intel-pill warn">⚠️ 還沒有 SCOUT 情報 — 請先到「市場情報」跑一次 SCOUT，RINA 才有調查依據</span>';
    }
  }catch(e){
    $('intel-status').innerHTML = '<span class="intel-pill warn">⚠️ 無法讀取 SCOUT 情報：'+e.message+'</span>';
  }
}

async function run(){
  const count = Number($('count').value);
  const brief = $('brief').value.trim();
  $('go').disabled = true;
  $('status').textContent = '🎬 RINA 正在看市場調查、寫分鏡…（約 20–40 秒）';
  $('result').style.display = 'none';
  try{
    const j = await fetch('/api/reels/generate', {
      method:'POST', headers:{'content-type':'application/json'},
      body: JSON.stringify({ count, brief })
    }).then(r=>r.json());
    if(!j.ok) throw new Error(j.error||'unknown');
    $('out').innerHTML = j.html + '<p style="margin-top:18px;font-size:12px;color:rgba(252,246,245,.5);">— '+(j.based_on_scout?'基於 SCOUT 全球市場調查':'（無 SCOUT 情報，依品牌常識發想）')+' · '+count+' 支</p>';
    $('result').style.display = 'block';
    $('status').textContent = '✅ 完成 — 點每支 Reels 下方「📸 為這支生成分鏡示意」即可拿到構圖';
    splitReelsAndAddButtons();
    $('result').scrollIntoView({ behavior:'smooth' });
  }catch(e){
    $('status').textContent = '❌ 失敗：' + e.message;
  }finally{
    $('go').disabled = false;
  }
}

// 把 RINA 輸出依 Reels N 標題切段，每段尾部插一顆按鈕＋容器
function splitReelsAndAddButtons(){
  const out = $('out');
  // 找出所有 Reels 標題（h4 / h3 / strong 都可能）
  const heads = Array.from(out.querySelectorAll('h1,h2,h3,h4,h5')).filter(h => /Reels?\s*\d+/i.test(h.textContent || ''));
  if (!heads.length) {
    // 沒抓到分段 — 退而求其次，整篇給一顆按鈕
    const btn = makeShotBtn(out.innerText.slice(0, 2200), '本次全部腳本');
    const wrap = document.createElement('div');
    wrap.style.marginTop = '14px';
    wrap.appendChild(btn);
    const box = document.createElement('div'); box.className = 'shot-box'; box.style.marginTop = '10px';
    wrap.appendChild(box);
    out.appendChild(wrap);
    return;
  }
  // 為每個 Reels 段落結尾插按鈕（在「下一個 Reels 標題出現之前」的最後位置）
  for (let i = 0; i < heads.length; i++) {
    const h = heads[i];
    const next = heads[i+1] || null;
    // 收集這段的純文字（h 到 next 之間）
    let txt = h.textContent + '\n';
    let n = h.nextSibling;
    while (n && n !== next) {
      if (n.nodeType === 1) txt += (n.textContent || '') + '\n';
      else if (n.nodeType === 3) txt += (n.nodeValue || '');
      n = n.nextSibling;
    }
    const label = (h.textContent.match(/Reels?\s*\d+[^\n:：]*/i) || ['這支'])[0].trim();
    const btn = makeShotBtn(txt.slice(0, 2200), label);
    const wrap = document.createElement('div');
    wrap.style.margin = '10px 0 18px';
    wrap.appendChild(btn);
    const box = document.createElement('div'); box.className = 'shot-box'; box.style.marginTop = '10px';
    wrap.appendChild(box);
    // 插到下一個 Reels 標題前；若沒下一個就附到 out 尾
    if (next) out.insertBefore(wrap, next);
    else out.appendChild(wrap);
  }
}

function makeShotBtn(copy, label){
  const b = document.createElement('button');
  b.textContent = '📸 為「' + label + '」生成 5 鏡分鏡示意';
  b.style.cssText = 'background:transparent;color:#B08D57;border:1px solid #B08D57;padding:8px 14px;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit;';
  b.onclick = () => generateShotsForReels(b, copy);
  return b;
}

async function generateShotsForReels(btn, copy){
  const wrap = btn.parentNode;
  const box = wrap.querySelector('.shot-box');
  const orig = btn.textContent;
  btn.disabled = true; btn.textContent = '🎨 DIRECTOR 思考中…';
  box.innerHTML = '<div style="font-size:12px;color:#B08D57;padding:8px 0;">📸 DIRECTOR 正在依這支腳本設計分鏡示意…（10-30 秒）</div>';
  try {
    const res = await fetch('/api/shot-director/from-copy', {
      method:'POST', headers:{'content-type':'application/json'},
      body: JSON.stringify({ copy, mode:'reels', count: 5 }),
    });
    const d = await res.json();
    if (!d.ok) throw new Error(d.error || '失敗');
    box.innerHTML = (d.css||'') + '<div style="font-size:12px;color:#B08D57;margin-bottom:6px;">📸 本支 Reels 的拍攝分鏡：</div>' + (d.html || '');
  } catch (e) {
    box.innerHTML = '<div style="color:#e76b6b;font-size:12px;">❌ ' + (e.message||e) + '</div>';
  } finally {
    btn.disabled = false; btn.textContent = orig;
  }
}

checkIntel();
</script>

<!-- ========== 主控台對話紀錄面板 ========== -->
<style>
.cdesk-history { max-width:920px; margin:18px auto 0; padding:0 18px; }
.cdesk-history h3 { color:#B08D57; font-size:15px; margin:0 0 8px; display:flex; align-items:center; gap:8px; }
.cdesk-history h3 a { font-size:11.5px; color:#B08D57; text-decoration:none; opacity:.7; margin-left:auto; font-weight:400; }
.cdesk-history .ch-empty { color:rgba(252,246,245,.5); font-size:12px; padding:14px; background:#2a1a1d; border:1px dashed rgba(176,141,87,.25); border-radius:8px; text-align:center; }
.cdesk-history .ch-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:10px; }
.cdesk-history .ch-card { background:#2a1a1d; border:1px solid rgba(176,141,87,.3); border-radius:8px; padding:10px 12px; text-decoration:none; color:#FCF6F5; transition:background .15s; display:block; }
.cdesk-history .ch-card:hover { background:rgba(176,141,87,.08); }
.cdesk-history .ch-card .ch-ts { font-size:11px; color:rgba(252,246,245,.5); margin-bottom:4px; }
.cdesk-history .ch-card .ch-title { font-size:13px; font-weight:600; line-height:1.4; }
.cdesk-history .ch-card .ch-snip { font-size:11.5px; color:rgba(252,246,245,.55); margin-top:4px; line-height:1.5; }
</style>
<div class="cdesk-history" id="cdesk-history-RINA"></div>
<script>
(function(){
  function fmtAgo(ts){ const d=(Date.now()-ts)/1000; if(d<60)return '剛剛'; if(d<3600)return Math.floor(d/60)+' 分鐘前'; if(d<86400)return Math.floor(d/3600)+' 小時前'; return Math.floor(d/86400)+' 天前'; }
  function esc(s){ return String(s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  async function load(){
    const wrap = document.getElementById('cdesk-history-RINA');
    if (!wrap) return;
    try {
      const j = await fetch('/api/history/list?fn=RINA&limit=20').then(r=>r.json());
      const items = (j&&j.items)||[];
      if (!items.length) {
        wrap.innerHTML = '<h3>📚 從主控台來的問答 / 對話 <a href="/history-view.html?fn=RINA">看完整 →</a></h3><div class="ch-empty">目前沒有從主控台來的相關問答。你在主控台對 RINA 員工提問或交付任務，答案會自動同步到這裡。</div>';
        return;
      }
      wrap.innerHTML = '<h3>📚 從主控台來的問答 / 對話 ('+items.length+') <a href="/history-view.html?fn=RINA">看完整 →</a></h3>'
        + '<div class="ch-grid">'
        + items.map(it=>'<a class="ch-card" href="/history-view.html?id='+it.id+'"><div class="ch-ts">'+fmtAgo(it.ts)+'</div><div class="ch-title">'+esc(it.title)+'</div>'+(it.snippet?'<div class="ch-snip">'+esc(it.snippet)+'…</div>':'')+'</a>').join('')
        + '</div>';
    } catch(e) {
      wrap.innerHTML = '<h3>📚 從主控台來的問答</h3><div class="ch-empty">載入失敗：'+e.message+'</div>';
    }
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', load);
  else load();
  // 每 30 秒自動重整
  setInterval(load, 30000);
})();
</script>
<!-- ========== /主控台對話紀錄面板 ========== -->
</body>
