<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📡 競品追蹤 · MACARON DE LUXE</title>
<style>
  :root {
    --burgundy: #6D2E46;
    --burgundy-dark: #4A1F30;
    --gold: #B08D57;
    --gold-bright: #E8B54B;
    --ivory: #FCF6F5;
    --dark: #0E0A0C;
    --dark-2: #1A1416;
    --dark-3: #251D20;
    --muted: #8B7278;
    --amber: #E8B54B;
    --green: #6FBF7E;
    --red: #C76B6B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--dark); color: var(--ivory);
    font-family: -apple-system, "PingFang TC", "Noto Sans TC", sans-serif;
    min-height: 100vh; padding: 20px;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  .header {
    border-bottom: 1px solid var(--burgundy);
    padding-bottom: 16px; margin-bottom: 24px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .header h1 { font-family: Georgia, serif; font-size: 22px; color: var(--gold); letter-spacing: 2px; font-weight: normal; }
  .header .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .header a { color: var(--gold); text-decoration: none; font-size: 12px; padding: 6px 12px; border: 1px solid var(--burgundy); border-radius: 6px; }
  .header a:hover { background: var(--burgundy-dark); }

  .competitors-bar {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
    padding: 14px; background: var(--dark-2); border-radius: 10px;
    border: 1px dashed var(--burgundy);
  }
  .comp-btn {
    padding: 8px 14px; cursor: pointer;
    background: var(--dark-3); color: var(--ivory);
    border: 1px solid var(--burgundy); border-radius: 18px;
    font-size: 13px; font-family: inherit;
  }
  .comp-btn:hover { border-color: var(--gold); }
  .comp-btn.active { background: var(--burgundy); border-color: var(--gold); color: var(--gold); }
  .scan-all {
    padding: 8px 14px; cursor: pointer;
    background: var(--gold); color: var(--burgundy);
    border: none; border-radius: 18px; font-size: 13px; font-weight: 600;
    margin-left: auto;
  }

  .search-row {
    display: flex; gap: 10px; margin-bottom: 20px; align-items: center;
  }
  .search-row input {
    flex: 1; padding: 10px 14px;
    background: var(--dark-3); border: 1px solid var(--burgundy-dark);
    color: var(--ivory); border-radius: 6px; font-size: 14px; font-family: inherit;
  }
  .search-row button {
    padding: 10px 20px; cursor: pointer;
    background: var(--burgundy); color: var(--gold);
    border: 1px solid var(--gold); border-radius: 6px;
    font-size: 14px; letter-spacing: 1px; font-family: Georgia, serif;
  }
  .search-row button:hover { background: var(--burgundy-dark); }

  .status {
    padding: 12px; background: var(--dark-2); border-radius: 8px;
    border-left: 3px solid var(--gold); margin-bottom: 16px;
    font-size: 13px; color: var(--ivory); line-height: 1.6; min-height: 24px;
  }
  .status a { color: var(--gold); text-decoration: underline; }

  .ads-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 14px;
  }
  .ad-card {
    background: var(--dark-2); border: 1px solid var(--burgundy-dark);
    border-radius: 10px; padding: 14px;
    display: flex; flex-direction: column;
  }
  .ad-page { font-size: 14px; color: var(--gold); font-weight: 600; margin-bottom: 6px; }
  .ad-dates { font-size: 10px; color: var(--muted); margin-bottom: 8px; }
  .ad-body {
    font-size: 12px; color: var(--ivory); line-height: 1.6;
    margin-bottom: 10px; white-space: pre-wrap;
    max-height: 140px; overflow-y: auto;
    padding: 8px; background: var(--dark-3); border-radius: 4px;
  }
  .ad-title { font-size: 12px; color: var(--amber); font-weight: 600; margin-bottom: 4px; }
  .ad-platforms {
    display: flex; gap: 4px; margin-bottom: 8px; flex-wrap: wrap;
  }
  .ad-platform {
    font-size: 10px; padding: 2px 8px;
    background: var(--burgundy-dark); color: var(--gold);
    border-radius: 10px;
  }
  .ad-link {
    font-size: 11px; color: var(--gold); text-decoration: none;
    padding: 6px 10px; background: rgba(176, 141, 87, 0.1);
    border-radius: 4px; text-align: center; margin-top: auto;
  }
  .ad-link:hover { background: rgba(176, 141, 87, 0.2); }

  .empty {
    grid-column: 1 / -1;
    text-align: center; padding: 40px 20px;
    color: var(--muted); font-size: 13px;
    background: var(--dark-2); border-radius: 10px;
  }
  .empty a { color: var(--gold); }

  .scan-results { margin-top: 24px; }
  .scan-section {
    margin-bottom: 24px; padding: 14px;
    background: var(--dark-2); border-radius: 10px;
    border-left: 3px solid var(--gold);
  }
  .scan-section-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px; font-family: Georgia, serif; color: var(--gold);
  }
  .scan-section-header h3 { font-size: 16px; font-weight: normal; letter-spacing: 1px; }
  .scan-section-header .count { font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>📡 競品廣告追蹤</h1>
      <div class="sub">Phase 1 · 看競品 Meta 廣告在跑什麼（資料來自 Meta Ad Library 公開資料）</div>
    </div>
    <a href="/">← 回主辦公室</a>
    <a href="/optimize.html">⚡ 廣告體檢</a>
  </div>

  <div class="competitors-bar" id="competitors-bar">
    <span style="font-size:11px;color:var(--muted);align-self:center;">預設競品：</span>
  </div>

  <div class="search-row">
    <input id="search-input" type="text" placeholder="輸入品牌名稱（例如：法朋、Ladurée、馬卡龍）">
    <button id="search-btn">🔍 搜尋</button>
    <button class="scan-all" id="scan-all-btn">🎯 掃全部競品</button>
  </div>

  <div id="status" class="status">選一個競品或輸入品牌開始追蹤。</div>

  <div id="results"></div>
</div>

<script>
const $ = id => document.getElementById(id);
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])
  );
}
function fmtDate(iso) {
  if (!iso) return '-';
  try { return new Date(iso).toLocaleDateString('zh-TW'); } catch(e) { return iso; }
}

async function loadCompetitors() {
  try {
    const res = await fetch('/api/intel/competitors');
    const list = await res.json();
    const bar = $('competitors-bar');
    list.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'comp-btn';
      btn.textContent = c.name;
      btn.onclick = () => { $('search-input').value = c.name; search(c.name); };
      bar.appendChild(btn);
    });
  } catch (e) {}
}

async function search(brand) {
  if (!brand) brand = $('search-input').value.trim();
  if (!brand) return;
  $('status').innerHTML = `🔍 搜尋 <strong>${escapeHtml(brand)}</strong> 在 Meta 跑的廣告...`;
  $('results').innerHTML = '';
  document.querySelectorAll('.comp-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === brand);
  });
  try {
    const res = await fetch('/api/intel/competitor-ads?brand=' + encodeURIComponent(brand));
    const d = await res.json();
    if (d.error) {
      const fallback = d.fallbackUrl || `https://www.facebook.com/ads/library/?ad_type=all&country=TW&q=${encodeURIComponent(brand)}`;
      $('status').innerHTML = `❌ API 取不到（${escapeHtml(d.error)}）<br>可以直接到 <a href="${fallback}" target="_blank">Meta Ad Library 公開頁</a> 看。`;
      return;
    }
    renderAds(d);
  } catch (e) {
    $('status').innerHTML = '❌ 網路錯誤：' + escapeHtml(e.message);
  }
}

function renderAds(d) {
  if (!d.count) {
    $('status').innerHTML = `🔎 <strong>${escapeHtml(d.searchTerms)}</strong> 目前沒有在 ${d.country} 投放中的廣告 · <a href="${d.publicLibraryUrl}" target="_blank">到 Meta Ad Library 查歷史紀錄</a>`;
    $('results').innerHTML = '';
    return;
  }
  $('status').innerHTML = `✅ 找到 <strong>${d.count}</strong> 個 <strong>${escapeHtml(d.searchTerms)}</strong> 正在 ${d.country} 投放的廣告 · <a href="${d.publicLibraryUrl}" target="_blank">在 Meta Ad Library 查看全部</a>`;
  $('results').innerHTML = '<div class="ads-grid">' + d.ads.map(ad => {
    const platforms = (ad.platforms || []).map(p => `<span class="ad-platform">${escapeHtml(p)}</span>`).join('');
    return `
      <div class="ad-card">
        <div class="ad-page">${escapeHtml(ad.pageName || '(未知)')}</div>
        <div class="ad-dates">${fmtDate(ad.startTime)} → ${ad.stopTime ? fmtDate(ad.stopTime) : '進行中'}</div>
        <div class="ad-platforms">${platforms}</div>
        ${ad.linkTitle ? `<div class="ad-title">${escapeHtml(ad.linkTitle)}</div>` : ''}
        ${ad.creativeBody ? `<div class="ad-body">${escapeHtml(ad.creativeBody.slice(0, 400))}${ad.creativeBody.length > 400 ? '...' : ''}</div>` : ''}
        ${ad.snapshotUrl ? `<a class="ad-link" href="${ad.snapshotUrl}" target="_blank">🔗 查看完整廣告</a>` : ''}
      </div>
    `;
  }).join('') + '</div>';
}

async function scanAll() {
  $('status').innerHTML = '🎯 掃全部預設競品...（約 20-30 秒）';
  $('results').innerHTML = '';
  try {
    const res = await fetch('/api/intel/competitor-scan');
    const d = await res.json();
    if (d.error) {
      $('status').innerHTML = '❌ ' + escapeHtml(d.error);
      return;
    }
    $('status').innerHTML = `🎯 掃描完成：<strong>${d.competitors.length}</strong> 個競品、共 <strong>${d.totalAds}</strong> 個正在投放的廣告`;
    $('results').innerHTML = '<div class="scan-results">' + d.competitors.map(c => `
      <div class="scan-section">
        <div class="scan-section-header">
          <h3>${escapeHtml(c.competitor)} <span style="font-size:11px;color:var(--muted);">· ${escapeHtml(c.category || '')}</span></h3>
          <span class="count">${c.adCount} 個廣告 · <a href="${c.publicLibraryUrl}" target="_blank" style="color:var(--gold);">在 Library 看</a></span>
        </div>
        ${c.adCount ? '<div class="ads-grid">' + c.ads.slice(0, 6).map(ad => `
          <div class="ad-card">
            <div class="ad-page">${escapeHtml(ad.pageName || '(未知)')}</div>
            <div class="ad-dates">${fmtDate(ad.startTime)} → ${ad.stopTime ? fmtDate(ad.stopTime) : '進行中'}</div>
            ${ad.creativeBody ? `<div class="ad-body">${escapeHtml(ad.creativeBody.slice(0, 300))}${ad.creativeBody.length > 300 ? '...' : ''}</div>` : ''}
            ${ad.snapshotUrl ? `<a class="ad-link" href="${ad.snapshotUrl}" target="_blank">🔗 看廣告</a>` : ''}
          </div>
        `).join('') + '</div>' : '<div class="empty" style="padding:20px;">沒有正在投放的廣告</div>'}
      </div>
    `).join('') + '</div>';
  } catch (e) {
    $('status').innerHTML = '❌ ' + escapeHtml(e.message);
  }
}

$('search-btn').onclick = () => search();
$('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
$('scan-all-btn').onclick = scanAll;
loadCompetitors();
</script>
</body>
</html>
