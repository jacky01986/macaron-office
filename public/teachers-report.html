<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>門店戰報</title>
<link rel="stylesheet" href="/macaron-shared.css">
<style>
  body{font-family:"Noto Sans TC",system-ui,sans-serif;margin:0;background:#1a0f12;color:#f3e9e6;padding:22px}
  h1{font-size:22px;margin:0}
  .sub{color:#b89a9f;font-size:13px;margin:5px 0 20px}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
  .kpi{background:#2a181d;border:1px solid #4a2d35;border-radius:12px;padding:16px}
  .kpi .l{font-size:12px;color:#b89a9f}
  .kpi .v{font-size:23px;color:#d4b483;font-weight:700;margin-top:4px}
  table{width:100%;border-collapse:collapse;font-size:14px;background:#2a181d;border:1px solid #4a2d35;border-radius:12px;overflow:hidden}
  th,td{padding:12px 14px;border-bottom:1px solid #4a2d35;text-align:right}
  th:first-child,td:first-child{text-align:left}
  th{color:#b89a9f;font-size:12px;font-weight:600}
  td.rev{color:#d4b483;font-weight:700}
  .bar{height:7px;background:#321c22;border-radius:5px;overflow:hidden;margin-top:6px}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,#a9895c,#d4b483)}
  .rk{color:#d4b483;font-weight:700;margin-right:8px}
  .note{color:#b89a9f;font-size:12px;margin-top:16px;line-height:1.7}
</style>
</head>
<body>
  <h1>🏪 門店戰報</h1>
  <div class="sub">各門市營收 · 訂單 · 客單價 ｜ 資料來源：線下報告中心</div>
  <div class="kpis" id="kpis">載入中…</div>
  <div id="cmp"></div>
  <div class="note" id="note"></div>
<script>
  function fmt(n){return (Number(n)||0).toLocaleString();}
  function esc(s){return String(s||"").replace(/[<>&]/g,function(c){return ({"<":"&lt;",">":"&gt;","&":"&amp;"})[c];});}
  function kpi(l,v){return "<div class=kpi><div class=l>"+l+"</div><div class=v>"+v+"</div></div>";}
  fetch("/api/offline-reports/summary").then(function(r){return r.json();}).then(function(d){
    var bs=(d.branches||[]).slice().sort(function(a,b){return (b.revenue||0)-(a.revenue||0);});
    var totalRev=d.total_revenue||0, totalOrders=d.total_orders||0;
    var totalCount=bs.reduce(function(s,b){return s+(b.count||0);},0);
    var maxRev=bs.length?(bs[0].revenue||1):1;
    document.getElementById("kpis").innerHTML=kpi("總營收","NT$"+fmt(totalRev))+kpi("總訂單",fmt(totalOrders))+kpi("門市數",bs.length)+kpi("紀錄筆數",fmt(totalCount));
    var rows="";
    bs.forEach(function(b,i){
      var pct=totalRev?Math.round(b.revenue/totalRev*1000)/10:0;
      var w=maxRev?Math.round(b.revenue/maxRev*100):0;
      var aov=(b.total_orders>0&&b.aov)?"NT$"+fmt(b.aov):"—";
      var ord=b.total_orders>0?fmt(b.total_orders):"—";
      rows+="<tr><td><span class=rk>"+(i+1)+"</span>"+esc(b.branch)+"</td><td class=rev>NT$"+fmt(b.revenue)+"<div class=bar><i style=\"width:"+w+"%\"></i></div><div style=\"font-size:11px;color:#b89a9f\">"+pct+"%</div></td><td>"+ord+"</td><td>"+aov+"</td><td>"+fmt(b.count)+"</td></tr>";
    });
    document.getElementById("cmp").innerHTML="<table><thead><tr><th>門市</th><th>累計營收</th><th>訂單</th><th>客單價</th><th>筆數</th></tr></thead><tbody>"+rows+"</tbody></table>";
    document.getElementById("note").innerHTML="更新："+(d.generated_at||"即時")+" ｜ 訂單與客單價目前僅 6 月有完整資料（客單＝有訂單日營收÷訂單），其他月份待補。";
  }).catch(function(e){document.getElementById("kpis").innerHTML="<div class=kpi>載入失敗："+e+"</div>";});
</script>
</body>
</html>
