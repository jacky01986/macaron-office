<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>👩 門店戰報 · 溫點 WarmPlace</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root {
    --bg: #0d0a0b;
    --card: #1a1416;
    --card-2: #241b1f;
    --border: #3b2a33;
    --gold: #B08D57;
    --gold-soft: #d4b595;
    --text: #e9dfd2;
    --muted: #998;
    --good: #7CB342;
    --ok: #FFB300;
    --high: #E53935;
  }
  body { font-family: -apple-system,'PingFang TC','Noto Sans TC','Montserrat',sans-serif; background:var(--bg); color:var(--text); margin:0; padding:0; }
  .nav { background:var(--card); padding:14px 24px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; border-bottom:1px solid var(--border); }
  .nav .brand { font-weight:800; font-size:18px; color:var(--gold); margin-right:16px; letter-spacing:2px; }
  .nav a { background:var(--gold); color:#1a1416; padding:8px 16px; border-radius:6px; text-decoration:none; font-size:14px; font-weight:600; }
  .nav a.home { background:transparent; color:var(--gold); margin-right:16px; border:1px solid var(--gold); }
  .nav a.active { background:var(--card-2); color:var(--gold); border:1px solid var(--gold); }
  .container { max-width:1300px; margin:0 auto; padding:24px; }
  h1 { color:var(--gold); font-size:24px; margin:0 0 8px; letter-spacing:2px; }
  .subtitle { color:var(--muted); margin-bottom:24px; font-size:13px; }
  .tabs { display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; }
  .tab { background:var(--card); color:var(--text); padding:10px 20px; border-radius:8px; cursor:pointer; border:1px solid var(--border); font-weight:600; user-select:none; transition:0.15s; }
  .tab.active { background:var(--gold); color:#1a1416; border-color:var(--gold); }
  .tab:hover:not(.active) { border-color:var(--gold); color:var(--gold); }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:24px; }
  .card { background:var(--card); padding:18px; border-radius:12px; border:1px solid var(--border); }
  .card .label { color:var(--gold); font-size:12px; text-transform:uppercase; font-weight:600; letter-spacing:1px; margin-bottom:6px; }
  .card .value { color:var(--text); font-size:28px; font-weight:700; line-height:1.2; }
  .card .sub { color:var(--muted); font-size:12px; margin-top:4px; }
  .health-good { color:var(--good) !important; }
  .health-ok { color:var(--ok) !important; }
  .health-high { color:var(--high) !important; }
  .loading { text-align:center; padding:40px; color:var(--muted); }
  .controls { display:flex; gap:12px; align-items:center; margin-bottom:16px; flex-wrap:wrap; }
  .controls label { color:var(--muted); }
  .controls select { background:var(--card); color:var(--text); border:1px solid var(--border); padding:6px 12px; border-radius:6px; }
  .controls button { background:var(--gold); color:#1a1416; border:none; padding:6px 14px; border-radius:6px; cursor:pointer; font-weight:600; }
  .controls button:hover { background:var(--gold-soft); }
  .compare-table { width:100%; border-collapse:collapse; background:var(--card); border-radius:12px; overflow:hidden; margin-top:24px; }
  .compare-table th { background:var(--gold); color:#1a1416; padding:12px; text-align:left; font-weight:700; font-size:13px; }
  .compare-table td { padding:12px; border-top:1px solid var(--border); color:var(--text); }
  .compare-table tr:hover td { background:var(--card-2); }
  .section { background:var(--card); padding:20px; border-radius:12px; margin-top:20px; border:1px solid var(--border); }
  .section h3 { color:var(--gold); margin:0 0 16px; font-size:16px; letter-spacing:1px; }
  .conv-item { padding:12px 0; border-bottom:1px solid var(--border); }
  .conv-item:last-child { border-bottom:none; }
  .conv-meta { color:var(--muted); font-size:12px; margin-bottom:4px; }
  .conv-text { color:var(--text); font-size:14px; line-height:1.5; }
  .segment-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); color:var(--text); }
  .segment-row .label { color:var(--muted); }
  .segment-row .count { font-weight:700; color:var(--gold); }
  .row-2col { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  @media (max-width:768px) { .row-2col { grid-template-columns:1fr; } }
  .badge { display:inline-block; padding:3px 10px; border-radius:12px; font-size:11px; font-weight:600; margin-left:8px; }
  .badge-good { background:#1B4D24; color:var(--good); }
  .badge-ok { background:#4D3D1B; color:var(--ok); }
  .badge-high { background:#4D1B1B; color:var(--high); }
  .badge-nodata { background:#2D2D2D; color:var(--muted); }
  .quick-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
  .quick-actions a { background:var(--card-2); color:var(--text); padding:8px 14px; border-radius:6px; text-decoration:none; font-size:13px; border:1px solid var(--border); }
  .quick-actions a:hover { border-color:var(--gold); color:var(--gold); }
  .error-box { background:#3a1a1a; color:#ffb4b4; border:1px solid #5a2a2a; padding:14px; border-radius:8px; margin:10px 0; font-size:13px; }
  .error-box pre { background:#000; padding:10px; border-radius:6px; color:#7CB342; overflow-x:auto; }
</style>
</head>
<body>
<style>
@media all { .macaron-topnav.in-iframe { display: none !important; } }
</style>
<script>
(function(){
  try {
    if (window.parent !== window) {
      var nav = document.querySelector('.macaron-topnav');
      if (nav) nav.classList.add('in-iframe');
      else document.addEventListener('DOMContentLoaded', function(){
        var n = document.querySelector('.macaron-topnav');
        if (n) n.classList.add('in-iframe');
      });
    }
  } catch(e){}
})();
</script>

<style>
.macaron-topnav { background: linear-gradient(135deg,#6B4226,#8B5A33); padding: 8px 16px; display: flex; gap: 8px; align-items: center; overflow-x: auto; white-space: nowrap; flex-shrink: 0; font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.macaron-topnav strong { color:#FAF7F2; font-size:14px; margin-right:8px; flex-shrink:0; }
.macaron-topnav a { padding:6px 12px; border-radius:6px; text-decoration:none; font-size:13px; font-weight:600; flex-shrink:0; background:#FAF7F2; color:#6B4226; transition: all 0.15s; }
.macaron-topnav a:hover { background:#fff; }
.macaron-topnav a.active { background:#10b981; color:white; }
</style>
<div class="macaron-topnav">
  <strong>溫點 WarmPlace</strong>
  <a href="/">🏠 主控台</a>
  <a href="/content-hub.html">📚 內容中心</a>
  <a href="/customer-hub.html">👥 客戶中心</a>
  <a href="/ads-hub.html">📊 廣告中心</a>
  <a href="/market-intel.html">🔍 市場情報</a>
  <a href="/teachers.html" class="active">🏪 門店戰報</a>
</div>

<div class="nav">
  <span class="brand">溫點 WarmPlace</span><a href="/customers.html">👥 客戶</a>
  <a href="/optimize.html">⚙️ 廣告優化</a>
  <a href="/google.html">🔍 Google</a>
  <a href="/competitor.html">🕵️ 競品</a>
  <a href="/teachers.html" class="active">👩 老�戰報</a>
</div>
<div class="container">
  <h1>👩 門店戰報</h1>
  <div class="subtitle">每位門店 / 分店的廣告成效、詢問品質與顧客之聲 · 即時數據</div>
  <div class="controls">
    <label>區間：</label>
    <select id="days">
      <option value="1">過去 24 小時</option>
      <option value="7" selected>過去 7 天</option>
      <option value="30">過去 30 天</option>
      <option value="90">過去 90 天</option>
    </select>
    <button onclick="load()">重新整理</button>
  </div>
  <div class="tabs" id="tabs">
    <div class="tab active" data-key="compare">📊 對比</div>
  </div>
  <div id="content" class="loading">載入中…</div>
</div>
<script>
let DATA = null;
let DETAIL = {};
let CURRENT = 'compare';

function healthBadge(h) {
  const labels = { good:'✅ 健康', ok:'⚠️ 普通', high:'🚨 偏高', no_data:'— 無資料' };
  const cls = (h || 'nodata').replace('_','');
  return '<span class="badge badge-' + cls + '">' + (labels[h] || h || '—') + '</span>';
}
function fmtNT(n) { return n == null ? '—' : 'NT$' + (n || 0).toLocaleString(); }
function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function teacherEmoji(key) {
  const map = { main:'👑', ofz:'👑' };
  return map[key] || '👩';
}

function buildTabs() {
  const tabsBox = document.getElementById('tabs');
  tabsBox.innerHTML = '<div class="tab' + (CURRENT==='compare'?' active':'') + '" data-key="compare">📊 對比</div>';
  for (const [key, t] of Object.entries(DATA || {})) {
    const div = document.createElement('div');
    div.className = 'tab' + (CURRENT===key?' active':'');
    div.dataset.key = key;
    div.textContent = teacherEmoji(key) + ' ' + (t.name || key);
    tabsBox.appendChild(div);
  }
}

async function load() {
  document.getElementById('content').innerHTML = '<div class="loading">📡 載入中…</div>';
  const days = document.getElementById('days').value;
  try {
    const [summary, customers] = await Promise.all([
      fetch('/api/teachers/summary?days=' + days + '&_=' + Date.now()).then(r => r.json()),
      fetch('/api/customers/inquiries?days=' + days + '&_=' + Date.now()).then(r => r.json()).catch(() => ({ customers:[], segments:{} }))
    ]);
    if (!summary.ok) throw new Error(summary.error || '門店資料載入失敗');
    DATA = summary.teachers || {};
    DETAIL = { customers: customers.customers || [], segments: customers.segments || {} };
    buildTabs();
    render();
  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="error-box">載入失敗：' + escapeHtml(e.message) + '<br><br>提示：請確認 META_AD_ACCOUNT_ID / META_ACCESS_TOKEN 已設定，且 TEACHERS_CONFIG 環境變數格式正確。</div>';
  }
}

function render() {
  if (Object.keys(DATA || {}).length === 0) {
    document.getElementById('content').innerHTML = '<div class="error-box">尚未設定任何門店 / 分店。<br><br>請在 Render 環境變數設定 <code>TEACHERS_CONFIG</code>，例如：<pre>[\n  { "key": "main", "name": "溫點 WarmPlace", "page_id": "你的FB粉專ID", "match": "" },\n  { "key": "antoine", "name": "Antoine 主廚", "page_id": "另一個粉專ID", "match": "antoine" }\n]</pre>match 用 regex 比對 campaign 名稱（不分大小寫），留空代表 fallback 預設。</div>';
    return;
  }
  if (CURRENT === 'compare') return renderCompare();
  return renderTeacher(CURRENT);
}

function renderCompare() {
  const teachers = Object.entries(DATA);
  let table = '<div class="section">';
  table += '<h3>📊 全部老� / 分店對比表</h3>';
  table += '<table class="compare-table"><thead><tr><th>名稱</th><th>詢問數</th><th>廣告花費</th><th>CPL</th><th>CTR</th><th>曝光</th><th>狀態</th></tr></thead><tbody>';
  for (const [k, t] of teachers) {
    table += '<tr style="cursor:pointer" onclick="selectTab(\''+k+'\')">';
    table += '<td><strong>'+escapeHtml(t.name)+'</strong></td>';
    table += '<td style="font-size:18px;font-weight:700;color:var(--gold)">'+(t.lead_count||0)+'</td>';
    table += '<td>'+fmtNT(t.spend_ntd)+'</td>';
    table += '<td>'+fmtNT(t.cost_per_lead_ntd)+'</td>';
    table += '<td>'+(t.ctr||'—')+'</td>';
    table += '<td>'+(t.impressions||0).toLocaleString()+'</td>';
    table += '<td>'+healthBadge(t.cpl_health)+'</td>';
    table += '</tr>';
  }
  table += '</tbody></table>';
  table += '<div style="margin-top:12px;color:var(--muted);font-size:13px">💡 點任一列查看該門店詳細數據</div>';
  table += '</div>';
  const totalLeads = teachers.reduce((s,[k,t]) => s+(t.lead_count||0),0);
  const totalSpend = teachers.reduce((s,[k,t]) => s+(t.spend_ntd||0),0);
  const totalImpressions = teachers.reduce((s,[k,t]) => s+(t.impressions||0),0);
  let html = '<div class="grid">' +
    '<div class="card"><div class="label">總詢問數</div><div class="value">'+totalLeads+'</div></div>' +
    '<div class="card"><div class="label">總廣告花費</div><div class="value">'+fmtNT(totalSpend)+'</div></div>' +
    '<div class="card"><div class="label">平均 CPL</div><div class="value">'+(totalLeads>0?fmtNT(Math.round(totalSpend/totalLeads)):'—')+'</div></div>' +
    '<div class="card"><div class="label">總曝光</div><div class="value">'+totalImpressions.toLocaleString()+'</div></div>' +
    '<div class="card"><div class="label">門店 / 分店數</div><div class="value">'+teachers.length+'</div></div>' +
    '</div>' + table;
  document.getElementById('content').innerHTML = html;
}

function renderTeacher(key) {
  const t = DATA[key];
  if (!t) { document.getElementById('content').innerHTML = '<div class="error-box">找不到該門店資料</div>'; return; }
  const teacherCustomers = (DETAIL.customers || []).filter(c => {
    if (!c.channel_id && !c.source) return key === 'main' || key === 'ofz';
    return (c.channel_id == t.page_id) || (c.source && c.source.toLowerCase().includes(key));
  });
  let html = '';
  html += '<div class="grid">';
  html += '<div class="card"><div class="label">詢問數</div><div class="value" style="color:var(--gold)">'+(t.lead_count||0)+'</div><div class="sub">本期間獨立客戶</div></div>';
  html += '<div class="card"><div class="label">廣告花費</div><div class="value">'+fmtNT(t.spend_ntd)+'</div></div>';
  const cplCls = t.cpl_health==='good'?'health-good':t.cpl_health==='ok'?'health-ok':t.cpl_health==='high'?'health-high':'';
  html += '<div class="card"><div class="label">CPL（成本/詢問）</div><div class="value '+cplCls+'">'+fmtNT(t.cost_per_lead_ntd)+'</div><div class="sub">'+healthBadge(t.cpl_health)+'</div></div>';
  html += '<div class="card"><div class="label">曝光</div><div class="value">'+(t.impressions||0).toLocaleString()+'</div></div>';
  html += '<div class="card"><div class="label">CTR</div><div class="value">'+(t.ctr||'—')+'</div></div>';
  html += '<div class="card"><div class="label">點擊</div><div class="value">'+(t.clicks||0).toLocaleString()+'</div></div>';
  html += '</div>';
  html += '<div class="row-2col">';
  html += '<div class="section"><h3>👥 客戶分群</h3>';
  if (teacherCustomers.length === 0) {
    html += '<div style="color:var(--muted);padding:20px 0;text-align:center">本期間無客戶資料</div>';
  } else {
    const now = Date.now();
    const seg = { vip:0, active:0, warm:0, cold:0 };
    for (const c of teacherCustomers) {
      const last = c.last_seen ? Math.floor((now - new Date(c.last_seen).getTime())/86400000) : 999;
      const inq = c.inquiry_count || 1;
      if (inq>=5 && last<=14) seg.vip++;
      else if (last<=14) seg.active++;
      else if (last<=30) seg.warm++;
      else seg.cold++;
    }
    html += '<div class="segment-row"><span class="label">🔥 VIP (5+ 詢問, 14 天內)</span><span class="count">'+seg.vip+'</span></div>';
    html += '<div class="segment-row"><span class="label">💚 活躍 (14 天內)</span><span class="count">'+seg.active+'</span></div>';
    html += '<div class="segment-row"><span class="label">🌤️ 溫客 (14-30 天)</span><span class="count">'+seg.warm+'</span></div>';
    html += '<div class="segment-row"><span class="label">❄️ 冷客 (30+ 天)</span><span class="count">'+seg.cold+'</span></div>';
  }
  html += '</div>';
  html += '<div class="section"><h3>🎯 行銷漏斗</h3>';
  const imp = t.impressions || 0;
  const clk = t.clicks || 0;
  const lead = t.lead_count || 0;
  const ctr2 = imp>0?(clk/imp*100).toFixed(2):'0';
  const cvr = clk>0?(lead/clk*100).toFixed(2):'0';
  html += '<div class="segment-row"><span class="label">👁 曝光</span><span class="count">'+imp.toLocaleString()+'</span></div>';
  html += '<div class="segment-row"><span class="label">🖱 點擊（'+ctr2+'%）</span><span class="count">'+clk.toLocaleString()+'</span></div>';
  html += '<div class="segment-row"><span class="label">📩 詢問（'+cvr+'%）</span><span class="count">'+lead+'</span></div>';
  html += '<div class="segment-row"><span class="label">📅 預約成交</span><span class="count" style="color:var(--muted)">需手動標記</span></div>';
  html += '</div>';
  html += '</div>';
  html += '<div class="section"><h3>💬 最新客戶（'+teacherCustomers.length+' 個）</h3>';
  if (teacherCustomers.length === 0) {
    html += '<div style="color:var(--muted);padding:20px 0;text-align:center">本期間還沒有客戶詢問此門店</div>';
  } else {
    for (const c of teacherCustomers.slice(0,10)) {
      html += '<div class="conv-item">';
      html += '<div class="conv-meta">'+escapeHtml(c.user_name || c.user_id || '匿名')+' · '+escapeHtml(c.channel || 'unknown')+' · 詢問 '+(c.inquiry_count||1)+' 次 · '+(c.last_seen?String(c.last_seen).slice(0,16):'—')+'</div>';
      html += '<div class="conv-text">客戶 ID: '+escapeHtml((c.user_id||'').slice(0,20))+'</div>';
      html += '</div>';
    }
  }
  html += '</div>';
  html += '<div class="section"><h3>⚡ 快速行動</h3>';
  html += '<div class="quick-actions">';
  const adAcct = (t.ad_account_id) || '';
  if (adAcct) html += '<a href="https://adsmanager.facebook.com/adsmanager/manage/campaigns?act='+escapeHtml(adAcct)+'" target="_blank">📊 開 Meta Ads Manager</a>';
  else html += '<a href="https://adsmanager.facebook.com/adsmanager/manage/campaigns" target="_blank">📊 開 Meta Ads Manager</a>';
  if (t.page_id) html += '<a href="https://business.facebook.com/latest/inbox/all?asset_id='+escapeHtml(t.page_id)+'" target="_blank">💬 進 '+escapeHtml(t.name)+' 收件夾</a>';
  html += '</div>';
  html += '<div style="margin-top:12px;color:var(--muted);font-size:13px">';
  html += '<strong style="color:var(--gold)">FB 粉專 ID:</strong> '+escapeHtml(t.page_id||'—')+'<br>';
  html += '<strong style="color:var(--gold)">Campaign 配對規則:</strong> '+escapeHtml(t.match_pattern||'(預設 fallback)');
  html += '</div></div>';
  document.getElementById('content').innerHTML = html;
}

function selectTab(key) {
  CURRENT = key;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.key === key));
  render();
}

document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  selectTab(tab.dataset.key);
});
document.getElementById('days').addEventListener('change', load);
load();
</script>
</body>
</html>
