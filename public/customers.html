<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>👥 客人畫像 · 溫點 WarmPlace</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="/macaron-shared.css">
<style>
  body{margin:0;padding:18px;background:transparent;color:#f4e8d4;font-family:'Noto Sans TC','PingFang TC',sans-serif}
  h1{font-size:22px;margin:0 0 4px}
  .sub{color:#a09186;font-size:13px;margin-bottom:18px}
  .summary{display:flex;gap:14px;flex-wrap:wrap;align-items:center;background:rgba(0,0,0,.32);padding:14px 18px;border-radius:14px;border:1px solid rgba(176,141,87,.22);margin-bottom:18px}
  .summary .item{font-size:14px;color:#ddd}
  .summary .item b{font-size:20px;color:#fff;margin:0 6px}
  .btn{background:linear-gradient(135deg,#5e2a3a 0%,#4a1e2c 100%);color:#f4e8d4;border:1px solid rgba(176,141,87,.4);border-radius:10px;padding:8px 14px;cursor:pointer;font-size:13px;margin-left:auto}
  .btn:hover{filter:brightness(1.15)}
  .cols{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
  .col{background:rgba(0,0,0,.32);border-radius:14px;border-top:3px solid var(--c);overflow:hidden;display:flex;flex-direction:column;min-height:240px}
  .col .head{padding:14px 16px}
  .col h3{margin:0;font-size:16px}
  .col .desc{color:#a09186;font-size:12px;margin-top:4px}
  .col .count{font-size:30px;font-weight:700;margin-top:6px;color:#fff}
  .col .body{padding:8px 12px 14px;flex:1;display:flex;flex-direction:column;gap:8px}
  .card{background:rgba(255,255,255,.04);border:1px solid rgba(176,141,87,.18);border-radius:10px;padding:10px 12px;font-size:13px;cursor:pointer;transition:background .12s}
  .card:hover{background:rgba(255,255,255,.08)}
  .card .name{font-weight:600;color:#fff;margin-bottom:3px}
  .card .meta{color:#a09186;font-size:11px}
  .card .last{color:#c9b89e;font-size:12px;margin-top:6px;font-style:italic;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .empty{color:#7a6e62;font-style:italic;text-align:center;padding:18px 0;font-size:13px}
  .loading{text-align:center;padding:40px 20px;color:#a09186}
  .ch-badge{display:inline-block;background:rgba(176,141,87,.18);color:#d9c4a3;padding:2px 6px;border-radius:4px;font-size:10px;margin-right:6px}
  .err{background:rgba(255,107,107,.12);border:1px solid rgba(255,107,107,.3);color:#ff9b9b;padding:12px 16px;border-radius:10px;margin-bottom:18px;font-size:13px}
</style>
</head>
<body>
  <h1>👥 客人畫像</h1>
  <div class="sub">溫點 WarmPlace · SaleSmartly 全管道 (FB DM + IG DM) · RFM 分群</div>
  <div id="err" class="err" style="display:none"></div>
  <div class="summary" id="summary">
    <div class="item">總計 <b id="t-total">0</b> 位客人</div>
    <div class="item" style="color:#B08D57">🔥 VIP <b id="t-vip">0</b></div>
    <div class="item" style="color:#3ddc84">💚 活躍 <b id="t-active">0</b></div>
    <div class="item" style="color:#4285F4">🆕 新客 <b id="t-new">0</b></div>
    <div class="item" style="color:#ff6b6b">😴 流失 <b id="t-atrisk">0</b></div>
    <button class="btn" onclick="load(true)">🔄 重新整理</button>
  </div>
  <div id="cols" class="cols">
    <div class="col" style="--c:#B08D57">
      <div class="head"><h3>🔥 VIP</h3><div class="desc">高頻 (≥5 則) + 近 14 天活躍</div><div class="count" id="c-vip">0</div></div>
      <div class="body" id="g-vip"><div class="empty">載入中…</div></div>
    </div>
    <div class="col" style="--c:#3ddc84">
      <div class="head"><h3>💚 活躍客</h3><div class="desc">14 天內有對話</div><div class="count" id="c-active">0</div></div>
      <div class="body" id="g-active"><div class="empty">載入中…</div></div>
    </div>
    <div class="col" style="--c:#4285F4">
      <div class="head"><h3>🆕 新客</h3><div class="desc">首次聯絡 ≤ 14 天</div><div class="count" id="c-new">0</div></div>
      <div class="body" id="g-new"><div class="empty">載入中…</div></div>
    </div>
    <div class="col" style="--c:#ff6b6b">
      <div class="head"><h3>😴 潛在流失</h3><div class="desc">超過 30 天沒聯絡</div><div class="count" id="c-atrisk">0</div></div>
      <div class="body" id="g-atrisk"><div class="empty">載入中…</div></div>
    </div>
  </div>

<div id="shopline-section" style="margin-top:24px;display:none">
    <div class="sub" style="font-size:16px;color:#B08D57;margin-bottom:10px">💰 Shopline LTV 客戶 (真實消費金額)</div>
    <div id="sl-summary" class="summary"></div>
    <div id="sl-cols" class="cols"></div>
  </div>
  <script>
function esc(s){return String(s||'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'})[c])}
function chTag(ch){const map={1:'FB',6:'IG'};return '<span class="ch-badge">'+(map[ch]||('CH'+ch))+'</span>'}

function classify(c){
  const now=Date.now();
  const lastMs=(c.last_at||0)*1000;
  const recencyDays=lastMs?Math.floor((now-lastMs)/86400000):9999;
  // 沒有 first_at — 用 last 當基準近似
  const msgCount=1; // board 只顯示有發訊息的客人，至少 1 通
  // 用狀態映射：hot → 活躍 / objection → 活躍 / stalled → 活躍 / waiting → 看 recency
  let seg;
  if(recencyDays>30) seg='atrisk';
  else if(recencyDays<=14 && (c.status==='hot' || c.tags && c.tags.includes('購買訊號'))) seg='vip';
  else if(recencyDays<=14) seg='active';
  else seg='atrisk';
  return {...c,recencyDays,segment:seg};
}

async function load(force){
  try{
    document.getElementById('err').style.display='none';
    const r=await fetch('/api/closer/board?days=60&limit=60'+(force?'&_='+Date.now():''));
    const j=await r.json();
    if(!j.ok)throw new Error(j.error||'API 失敗');
    const customers=(j.conversations||[]).filter(c=>Number(c.channel)!==2).map(classify);  // 過濾掉 LINE channel (已停用)
    const groups={vip:[],active:[],new:[],atrisk:[]};
    customers.forEach(c=>{if(groups[c.segment]) groups[c.segment].push(c)});
    // 排序：近 14 天活躍的最新優先；流失越久越前
    const sortFn=(a,b)=>(b.last_at||0)-(a.last_at||0);
    Object.keys(groups).forEach(k=>groups[k].sort(sortFn));
    // summary
    document.getElementById('t-total').textContent=customers.length;
    document.getElementById('t-vip').textContent=groups.vip.length;
    document.getElementById('t-active').textContent=groups.active.length;
    document.getElementById('t-new').textContent=groups.new.length;
    document.getElementById('t-atrisk').textContent=groups.atrisk.length;
    document.getElementById('c-vip').textContent=groups.vip.length;
    document.getElementById('c-active').textContent=groups.active.length;
    document.getElementById('c-new').textContent=groups.new.length;
    document.getElementById('c-atrisk').textContent=groups.atrisk.length;
    // render cards
    Object.keys(groups).forEach(seg=>{
      const el=document.getElementById('g-'+seg);
      if(groups[seg].length===0){el.innerHTML='<div class="empty">目前沒人</div>';return}
      el.innerHTML=groups[seg].map(c=>{
        const ago=c.recencyDays>=9000?'未知':(c.recencyDays===0?'今天':c.recencyDays+' 天前');
        return '<div class="card">'
          +'<div class="name">'+chTag(c.channel)+esc(c.name)+'</div>'
          +'<div class="meta">'+ago+(c.status_label?' · '+c.status_label:'')+'</div>'
          +(c.last_text?'<div class="last">「'+esc(c.last_text)+'」</div>':'')
          +'</div>';
      }).join('');
    });
  }catch(e){
    document.getElementById('err').textContent='載入失敗：'+e.message;
    document.getElementById('err').style.display='block';
    ['vip','active','new','atrisk'].forEach(s=>{document.getElementById('g-'+s).innerHTML='<div class="empty">載入失敗</div>'});
  }
}

async function loadShoplineLTV(){
  try{
    const r=await fetch('/api/shopline/customers-ltv?limit=200');
    const j=await r.json();
    if(!j.ok || !j.customers || !j.customers.length)return;
    document.getElementById('shopline-section').style.display='block';
    const cs=j.customers;const groups={vip:[],active:[],new:[],atrisk:[]};
    cs.forEach(c=>{if(groups[c.segment])groups[c.segment].push(c)});
    const sum=document.getElementById('sl-summary');
    sum.innerHTML='<div class="item">總計 <b>'+cs.length+'</b> 個 Shopline 客戶</div>'+
      '<div class="item" style="color:#B08D57">🔥 VIP <b>'+groups.vip.length+'</b></div>'+
      '<div class="item" style="color:#3ddc84">💚 活躍 <b>'+groups.active.length+'</b></div>'+
      '<div class="item" style="color:#4285F4">🆕 新客 <b>'+groups.new.length+'</b></div>'+
      '<div class="item" style="color:#ff6b6b">😴 流失 <b>'+groups.atrisk.length+'</b></div>';
    const cols=document.getElementById('sl-cols');
    const conf=[
      ['vip','#B08D57','🔥 VIP','累積 ≥ NT$10k 或 ≥2 單'],
      ['active','#3ddc84','💚 活躍客','30 天內有訂單'],
      ['new','#4285F4','🆕 新客','首次 30 天內'],
      ['atrisk','#ff6b6b','😴 潛在流失','90+ 天沒下單']
    ];
    cols.innerHTML=conf.map(([k,c,h,d])=>'<div class="col" style="--c:'+c+'"><div class="head"><h3>'+h+'</h3><div class="desc">'+d+'</div><div class="count">'+groups[k].length+'</div></div><div class="body">'+(groups[k].length?groups[k].slice(0,8).map(c=>{
      const ago=c.recency_days>=9000?'未下單':c.recency_days+' 天前';
      return '<div class="card"><div class="name">💰 '+esc(c.name)+'</div><div class="meta">NT$'+c.ltv_total+' · '+c.order_count+' 單 · '+ago+'</div></div>';
    }).join(''):'<div class="empty">目前沒人</div>')+'</div></div>').join('');
  }catch(e){console.log('[shopline] LTV load failed',e)}
}
load();
loadShoplineLTV();
</script>
</body>
</html>
