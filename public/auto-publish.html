<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤖 自動發文控制台 · 溫點 WarmPlace</title>
<style>
  :root {
    --burgundy: #6D2E46;
    --burgundy-dark: #4A1D2E;
    --burgundy-light: #8B3A4E;
    --gold: #B08D57;
    --gold-bright: #D4AF7A;
    --ivory: #FCF6F5;
    --dark: #1C1213;
    --dark-2: #2A1C1D;
    --dark-3: #362527;
    --muted: #8B7278;
    --green: #7FB069;
    --amber: #E8B54B;
    --red: #C77B7D;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Microsoft JhengHei", "Segoe UI", sans-serif;
    background: var(--dark); color: var(--ivory);
    min-height: 100vh; padding: 24px;
  }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--dark-2); }
  ::-webkit-scrollbar-thumb { background: var(--burgundy); border-radius: 4px; }
  .container { max-width: 1400px; margin: 0 auto; }
  header.page-head {
    border-bottom: 1px solid var(--burgundy); padding-bottom: 18px; margin-bottom: 24px;
    display: flex; align-items: center; gap: 16px;
  }
  header.page-head h1 {
    font-family: Georgia, serif; font-size: 26px; letter-spacing: 2px;
    color: var(--ivory);
  }
  header.page-head .gold { color: var(--gold); }
  header.page-head .back {
    background: transparent; color: var(--gold); border: 1px solid var(--gold);
    padding: 6px 14px; border-radius: 18px; font-size: 12px;
    text-decoration: none; transition: background 0.2s, color 0.2s;
  }
  header.page-head .back:hover { background: var(--gold); color: var(--dark); }
  header.page-head .spacer { flex: 1; }

  .status-bar {
    background: var(--dark-2); border: 1px solid var(--burgundy-dark);
    border-radius: 10px; padding: 14px 18px; margin-bottom: 20px;
    display: flex; gap: 24px; flex-wrap: wrap;
  }
  .status-item { font-size: 13px; }
  .status-item .lbl { color: var(--muted); font-family: Georgia, serif; font-size: 11px; letter-spacing: 1px; display: block; margin-bottom: 2px; }
  .status-item .val { color: var(--gold-bright); font-weight: 600; }
  .status-item .val.ok { color: var(--green); }
  .status-item .val.warn { color: var(--amber); }
  .status-item .val.err { color: var(--red); }

  .action-bar {
    display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .btn {
    background: var(--burgundy); color: var(--ivory); border: 1px solid var(--burgundy-light);
    padding: 12px 22px; border-radius: 24px; font-size: 14px; cursor: pointer;
    font-family: inherit; transition: background 0.2s, transform 0.1s;
  }
  .btn:hover { background: var(--burgundy-light); }
  .btn:active { transform: scale(0.97); }
  .btn.primary {
    background: linear-gradient(135deg, var(--gold), var(--burgundy-light));
    color: var(--dark); border-color: var(--gold-bright); font-weight: 600;
  }
  .btn.primary:hover { background: linear-gradient(135deg, var(--gold-bright), var(--burgundy)); }
  .btn.ghost { background: transparent; color: var(--gold); border-color: var(--burgundy); }
  .btn.ghost:hover { background: var(--burgundy-dark); }

  h2.section-title {
    font-family: Georgia, serif; font-size: 14px; letter-spacing: 3px;
    color: var(--gold); border-left: 3px solid var(--gold);
    padding-left: 10px; margin: 32px 0 16px;
  }

  .drafts-grid {
    display: grid; gap: 16px;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  }
  .draft-card {
    background: var(--dark-2); border: 1px solid var(--burgundy-dark);
    border-radius: 12px; overflow: hidden; transition: border-color 0.2s;
  }
  .draft-card:hover { border-color: var(--gold); }
  .draft-card .img-wrap {
    background: var(--dark-3); aspect-ratio: 1/1; position: relative;
    display: flex; align-items: center; justify-content: center;
    border-bottom: 1px solid var(--burgundy-dark);
  }
  .draft-card .img-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .draft-card .img-wrap .no-img {
    color: var(--muted); font-size: 12px; font-style: italic;
  }
  .draft-card .img-wrap .platform-tag {
    position: absolute; top: 8px; left: 8px;
    background: var(--burgundy); color: var(--ivory);
    padding: 4px 10px; border-radius: 12px; font-size: 11px;
    font-family: Georgia, serif; letter-spacing: 1px;
  }
  .draft-card .img-wrap .status-tag {
    position: absolute; top: 8px; right: 8px;
    padding: 4px 10px; border-radius: 12px; font-size: 11px;
    font-weight: 600; letter-spacing: 1px;
  }
  .draft-card .status-tag.pending { background: var(--amber); color: var(--dark); }
  .draft-card .status-tag.published { background: var(--green); color: var(--dark); }
  .draft-card .status-tag.failed { background: var(--red); color: var(--ivory); }
  .draft-card .body {
    padding: 14px;
  }
  .draft-card .caption {
    font-size: 13px; line-height: 1.7; color: var(--ivory);
    white-space: pre-wrap; word-break: break-word;
    max-height: 140px; overflow-y: auto;
  }
  .draft-card .meta {
    display: flex; gap: 12px; margin-top: 10px;
    font-size: 10px; color: var(--muted); font-family: Georgia, serif;
  }
  .draft-card .actions {
    display: flex; gap: 8px; padding: 10px 14px;
    border-top: 1px solid var(--burgundy-dark); background: var(--dark-3);
  }
  .draft-card .actions .btn { padding: 6px 12px; font-size: 11px; }

  .empty {
    text-align: center; padding: 60px 20px;
    color: var(--muted); font-style: italic;
  }
  .empty .icon { font-size: 60px; margin-bottom: 12px; opacity: 0.3; }

  .gallery {
    display: grid; gap: 10px;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  }
  .gallery img {
    width: 100%; aspect-ratio: 1/1; object-fit: cover;
    border-radius: 8px; border: 1px solid var(--burgundy-dark);
    cursor: pointer; transition: transform 0.2s, border-color 0.2s;
  }
  .gallery img:hover { transform: scale(1.04); border-color: var(--gold); }

  .modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: none; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .modal.active { display: flex; }
  .modal img { max-width: 90vw; max-height: 90vh; border-radius: 12px; }
  .modal .close { position: absolute; top: 20px; right: 30px; color: var(--ivory); font-size: 32px; cursor: pointer; background: none; border: none; }

  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: var(--burgundy); color: var(--ivory);
    padding: 14px 24px; border-radius: 24px; border: 1px solid var(--gold);
    font-size: 13px; z-index: 200; opacity: 0; transition: opacity 0.3s;
    pointer-events: none; max-width: 80vw;
  }
  .toast.show { opacity: 1; }
  .toast.ok { background: var(--green); color: var(--dark); }
  .toast.err { background: var(--red); color: var(--ivory); }

  .config-card {
    background: var(--dark-2); border: 1px solid var(--burgundy-dark);
    border-radius: 10px; padding: 16px; margin-bottom: 16px;
    font-size: 12px; line-height: 1.7;
  }
  .config-card h3 { font-family: Georgia, serif; color: var(--gold); font-size: 12px; letter-spacing: 2px; margin-bottom: 10px; }
  .config-card code { background: var(--dark-3); padding: 2px 6px; border-radius: 3px; color: var(--gold-bright); font-size: 11px; }
  .config-card .env-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px dotted var(--burgundy-dark); }
  .config-card .env-row:last-child { border: none; }
  .config-card .env-name { color: var(--gold); }
  .config-card .env-status { color: var(--muted); }
  .config-card .env-status.ok { color: var(--green); }
  .config-card .env-status.missing { color: var(--red); }
</style>

<div class="container">

  <header class="page-head">
    <a href="/" class="back">← 主控台</a>
    <h1>🤖 自動發文 <span class="gold">控制台</span></h1>
    <div class="spacer"></div>
    <div style="font-size: 11px; color: var(--muted);">每天 09:00 + 19:00 自動產草稿</div>
  </header>

  <div class="status-bar" id="statusBar">
    <div class="status-item"><span class="lbl">系統狀態</span><span class="val" id="sysStatus">⏳ 載入中…</span></div>
    <div class="status-item"><span class="lbl">未發布草稿</span><span class="val" id="pendingCount">—</span></div>
    <div class="status-item"><span class="lbl">已發布(累計)</span><span class="val" id="publishedCount">—</span></div>

  </div>

  <button class="close" onclick="closeModal(true)">×</button>

<div class="toast" id="toast"></div>

<script>
async function api(method, url, body) {
  const opts = { method };
  if (body) { opts.headers = { 'Content-Type': 'application/json' }; opts.body = JSON.stringify(body); }
  const r = await fetch(url, opts);
  const j = await r.json();
  if (!r.ok) throw new Error(j.error || r.statusText);
  return j;
}
function toast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 3000);
}
function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleString('zh-TW', { hour12: false });
}

async function loadDrafts() {
  try {
    const data = await api('GET', '/api/auto-publish/drafts');
    const drafts = (data.drafts || []).slice().reverse();
    const pending = drafts.filter(d => d.status === 'pending');
    const published = drafts.filter(d => d.status === 'published');
    document.getElementById('pendingCount').textContent = pending.length;
    document.getElementById('publishedCount').textContent = published.length;
    if (drafts.length > 0) {
      const latest = drafts.find(d => d.created_at);
      document.getElementById('lastRun').textContent = fmtTime(latest?.created_at);
    }
    const area = document.getElementById('draftsArea');
    if (drafts.length === 0) {
      area.innerHTML = `<div class="empty" style="grid-column:1/-1;"><div class="icon">📭</div>還沒有草稿。點上方「立刻產 IG + FB 草稿」開始。</div>`;
      return;
    }
    area.innerHTML = drafts.slice(0, 20).map(d => `
      <div class="draft-card">
        <div class="img-wrap">
          ${d.image_url
            ? `<img src="${escapeHtml(d.image_url)}" alt="" onclick="showModal('${escapeHtml(d.image_url)}')">`
            : `<div class="no-img" style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:20px;">
            <div>⚠️ 還沒配圖</div>
            <label class="btn primary" style="cursor:pointer;font-size:11px;padding:6px 14px;">
              📤 上傳圖片
              <input type="file" accept="image/*" style="display:none;" onchange="uploadImage('${escapeHtml(d.id)}', this)">
            </label>
            ${d.image_error ? '<div style="font-size:10px;color:var(--red);">'+escapeHtml(d.image_error.slice(0,60))+'</div>' : ''}
          </div>`}
          <span class="platform-tag">${escapeHtml(d.platform)}</span>
          <span class="status-tag ${escapeHtml(d.status)}">${statusLabel(d.status)}</span>
        </div>
        <div class="body">
          <div class="caption">${escapeHtml(d.caption || '')}</div>
          <div class="meta">
            <span>🕐 ${fmtTime(d.created_at)}</span>
            ${d.published_at ? '<span>📤 ' + fmtTime(d.published_at) + '</span>' : ''}
          </div>
          ${d.shots_html ? '<details style="margin-top:10px;"><summary style="color:#B08D57;font-size:12px;cursor:pointer;font-weight:600;">📸 DIRECTOR 拍攝示意（依本篇文案生成 · 點開查看）</summary>' + (d.shots_css||'') + '<div style="margin-top:8px;">' + d.shots_html + '</div></details>' : ''}
        </div>
        ${d.status !== 'published' ? `
        <div class="actions">
          ${(d.platform === 'FB' || d.image_url)
            ? `<button class="btn primary" onclick="approveDraft('${escapeHtml(d.decisionId || '')}', '${escapeHtml(d.platform)}', '${escapeHtml(d.id)}')">✅ 立刻發布</button>`
            : `<label class="btn primary" style="cursor:pointer;">
                 📤 上傳圖片
                 <input type="file" accept="image/*" style="display:none;" onchange="uploadImage('${escapeHtml(d.id)}', this)">
               </label>`}
          <button class="btn ghost" onclick="copyCap(\`${escapeJs(d.caption)}\`)">📋 複製</button>
          <button class="btn ghost" style="color:var(--red);border-color:var(--red);" onclick="deleteDraft('${escapeHtml(d.id)}')">🗑</button>
        </div>` : ''}
      </div>
    `).join('');
  } catch (e) {
    document.getElementById('draftsArea').innerHTML = `<div class="empty" style="grid-column:1/-1;color:var(--red);">載入失敗:${escapeHtml(e.message)}</div>`;
  }
}

async function loadGallery() {
  try {
    const data = await api('GET', '/api/image-gen/recent?n=24');
    const images = data.images || [];
    const area = document.getElementById('galleryArea');
    if (!images.length) {
      area.innerHTML = `<div class="empty" style="grid-column:1/-1;"><div class="icon">🎨</div>還沒生過圖。設好 OPENAI_API_KEY 後就會自動產圖。</div>`;
      return;
    }
    area.innerHTML = images.map(img =>
      `<img src="${escapeHtml(img.url)}" alt="" onclick="showModal('${escapeHtml(img.url)}')" loading="lazy">`
    ).join('');
  } catch (e) {
    document.getElementById('galleryArea').innerHTML = `<div class="empty" style="grid-column:1/-1;color:var(--red);">圖庫載入失敗:${escapeHtml(e.message)}</div>`;
  }
}

async function loadEnvCheck() {
  try {
    // 簡單呼叫一個輕量端點看 server 在不在
    await api('GET', '/api/employees');
    document.getElementById('sysStatus').textContent = '✅ 上線';
    document.getElementById('sysStatus').className = 'val ok';
  } catch (e) {
    document.getElementById('sysStatus').textContent = '❌ 離線';
    document.getElementById('sysStatus').className = 'val err';
  }

}

async function triggerNow() {
  toast('🚀 開始產草稿…(需 30-60 秒)');
  try {
    const r = await api('POST', '/api/auto-publish/run-now');
    if (r.ok) {
      toast(`✅ 產了 ${r.generated_count} 份草稿`, 'ok');
      setTimeout(loadAll, 1500);
    } else {
      toast('⚠️ ' + (r.reason || '未知錯誤'), 'err');
    }
  } catch (e) { toast('❌ ' + e.message, 'err'); }
}
async function processNow() {
  toast('📤 處理已通過的草稿…');
  try {
    const r = await api('POST', '/api/auto-publish/process-decisions');
    toast(`✅ 處理 ${r.processed || 0}, 發布 ${r.published || 0}`, 'ok');
    setTimeout(loadAll, 1500);
  } catch (e) { toast('❌ ' + e.message, 'err'); }
}
async function testImage() {
  toast('🎨 測試生圖中…(30 秒)');
  try {
    const r = await api('POST', '/api/image-gen/test', { brief: '法式精品馬卡龍 12 入禮盒,玫瑰花瓣與絲帶' });
    if (r.ok) {
      toast('✅ 生圖成功', 'ok');
      showModal(r.publicUrl);
      setTimeout(loadGallery, 1000);
    } else { toast('❌ ' + r.error, 'err'); }
  } catch (e) { toast('❌ ' + e.message, 'err'); }
}
async function approveDraft(_decisionId, platform, draftId) {
  if (!confirm(`確定要立刻發布這份 ${platform} 草稿嗎?`)) return;
  try {
    const r = await api('POST', '/api/auto-publish/approve/' + draftId);
    if (r.ok) {
      toast('✅ ' + platform + ' 已發布!', 'ok');
      setTimeout(loadAll, 1000);
    } else {
      toast('❌ ' + (r.error || '發佈失敗'), 'err');
    }
  } catch (e) { toast('❌ ' + e.message, 'err'); }
}

async function uploadImage(draftId, fileInput) {
  const file = fileInput.files[0];
  if (!file) return;
  if (file.size > 12 * 1024 * 1024) { toast('❌ 圖片超過 12 MB', 'err'); return; }
  toast('📤 上傳中…');
  const fd = new FormData();
  fd.append('image', file);
  try {
    const r = await fetch('/api/auto-publish/upload-image/' + draftId, { method: 'POST', body: fd });
    const j = await r.json();
    if (j.ok) {
      toast('✅ 圖片上傳成功', 'ok');
      setTimeout(loadAll, 800);
    } else {
      toast('❌ ' + (j.error || '上傳失敗'), 'err');
    }
  } catch (e) { toast('❌ ' + e.message, 'err'); }
}

async function deleteDraft(draftId) {
  if (!confirm('確定刪掉這份草稿?')) return;
  try {
    const r = await api('POST', '/api/auto-publish/delete/' + draftId);
    if (r.ok) { toast('🗑 已刪除', 'ok'); setTimeout(loadAll, 800); }
  } catch (e) { toast('❌ ' + e.message, 'err'); }
}
function copyCap(text) {
  navigator.clipboard.writeText(text).then(() => toast('📋 已複製文案', 'ok'));
}
function statusLabel(s) {
  return { pending: '⏳ 待審', published: '✅ 已發', failed: '❌ 失敗', 'needs-image': '⚠️ 缺圖' }[s] || s;
}
function escapeHtml(t) {
  return String(t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
function escapeJs(t) {
  return String(t || '').replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$');
}
function showModal(url) {
  document.getElementById('modalImg').src = url;
  document.getElementById('modal').classList.add('active');
}
function closeModal(e) {
  if (e === true || e.target.id === 'modal') {
    document.getElementById('modal').classList.remove('active');
  }
}

async function loadAll() {
  await loadEnvCheck();
  await loadDrafts();
  await loadGallery();
}

loadAll();
// 自動刷新一次(每 30 秒)
setInterval(loadAll, 30000);
</script>
<script>
/* === 待審草稿 人工編輯功能（追加，不動既有渲染） === */
(function(){
  var cache = {};
  function getDraftId(card){
    var els = card.querySelectorAll('[onclick]');
    for (var i=0;i<els.length;i++){
      var m = (els[i].getAttribute('onclick')||'').match(/'(draft_[a-z0-9_]+)'/i);
      if (m) return m[1];
    }
    return null;
  }
  function fmt(iso){ if(!iso) return ''; try { return new Date(iso).toLocaleString('zh-TW',{hour12:false}); } catch(e){ return ''; } }
  async function refreshCache(){
    try { var r = await fetch('/api/auto-publish/drafts'); var j = await r.json(); cache = {}; (j.drafts||[]).forEach(function(d){ cache[d.id]=d; }); } catch(e){}
  }
  function enhance(){
    document.querySelectorAll('#draftsArea .draft-card').forEach(function(card){
      var id = getDraftId(card); if(!id) return;
      var d = cache[id];
      var body = card.querySelector('.body');
      if (body && d && d.title && !body.querySelector('.wp-title-badge')){
        var b = document.createElement('div');
        b.className = 'wp-title-badge';
        b.style.cssText = 'color:#D4AF7A;font-size:12px;font-weight:600;margin-bottom:6px;';
        b.textContent = '🏷 ' + d.title;
        body.insertBefore(b, body.firstChild);
      }
      var meta = card.querySelector('.meta');
      if (meta && d && d.scheduled_at && !meta.querySelector('.wp-sched-badge')){
        var s = document.createElement('span');
        s.className = 'wp-sched-badge';
        s.textContent = '📅 ' + fmt(d.scheduled_at);
        meta.appendChild(s);
      }
      var actions = card.querySelector('.actions');
      if (actions && !actions.querySelector('.wp-edit-btn')){
        var btn = document.createElement('button');
        btn.className = 'btn ghost wp-edit-btn';
        btn.textContent = '✏️ 編輯';
        btn.onclick = function(){ openEditor(id); };
        actions.insertBefore(btn, actions.firstChild);
      }
    });
  }
  function ensureModal(){
    if (document.getElementById('wpEditModal')) return;
    var m = document.createElement('div');
    m.id = 'wpEditModal';
    m.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center;z-index:300;padding:20px;';
    m.innerHTML = '<div style="background:#2A1C1D;border:1px solid #B08D57;border-radius:12px;padding:22px;max-width:540px;width:100%;max-height:90vh;overflow:auto;font-family:inherit;">'
      + '<h3 style="color:#B08D57;font-family:Georgia,serif;letter-spacing:2px;margin:0 0 16px;">✏️ 編輯草稿</h3>'
      + '<input type="hidden" id="wpEditId">'
      + '<label style="display:block;color:#8B7278;font-size:11px;letter-spacing:1px;margin:10px 0 4px;">標題 / 分類標籤</label>'
      + '<input id="wpEditTitle" type="text" placeholder="例：母親節禮盒 / 品牌故事" style="width:100%;padding:10px;border-radius:8px;border:1px solid #4A1D2E;background:#1C1213;color:#FCF6F5;font-size:13px;">'
      + '<label style="display:block;color:#8B7278;font-size:11px;letter-spacing:1px;margin:12px 0 4px;">平台</label>'
      + '<select id="wpEditPlatform" style="width:100%;padding:10px;border-radius:8px;border:1px solid #4A1D2E;background:#1C1213;color:#FCF6F5;font-size:13px;"><option value="IG">IG</option><option value="FB">FB</option></select>'
      + '<label style="display:block;color:#8B7278;font-size:11px;letter-spacing:1px;margin:12px 0 4px;">發布時間（排程／紀錄）</label>'
      + '<input id="wpEditSched" type="datetime-local" style="width:100%;padding:10px;border-radius:8px;border:1px solid #4A1D2E;background:#1C1213;color:#FCF6F5;font-size:13px;">'
      + '<label style="display:block;color:#8B7278;font-size:11px;letter-spacing:1px;margin:12px 0 4px;">貼文文字內容</label>'
      + '<textarea id="wpEditCaption" rows="9" style="width:100%;padding:10px;border-radius:8px;border:1px solid #4A1D2E;background:#1C1213;color:#FCF6F5;font-size:13px;line-height:1.6;resize:vertical;font-family:inherit;"></textarea>'
      + '<div style="display:flex;gap:10px;margin-top:16px;"><button class="btn primary" id="wpEditSave">💾 儲存</button><button class="btn ghost" id="wpEditCancel">取消</button></div>'
      + '</div>';
    document.body.appendChild(m);
    m.addEventListener('click', function(e){ if(e.target===m) m.style.display='none'; });
    document.getElementById('wpEditCancel').onclick = function(){ m.style.display='none'; };
    document.getElementById('wpEditSave').onclick = saveEditor;
  }
  function toLocalInput(iso){
    if(!iso) return '';
    var dt = new Date(iso); if(isNaN(dt)) return '';
    var p = function(n){ return String(n).padStart(2,'0'); };
    return dt.getFullYear()+'-'+p(dt.getMonth()+1)+'-'+p(dt.getDate())+'T'+p(dt.getHours())+':'+p(dt.getMinutes());
  }
  window.openEditor = async function(id){
    ensureModal();
    if(!cache[id]) await refreshCache();
    var d = cache[id] || {};
    document.getElementById('wpEditId').value = id;
    document.getElementById('wpEditTitle').value = d.title || '';
    document.getElementById('wpEditPlatform').value = (d.platform==='FB')?'FB':'IG';
    document.getElementById('wpEditSched').value = toLocalInput(d.scheduled_at||'');
    document.getElementById('wpEditCaption').value = d.caption || '';
    document.getElementById('wpEditModal').style.display = 'flex';
  };
  async function saveEditor(){
    var id = document.getElementById('wpEditId').value;
    var sched = document.getElementById('wpEditSched').value;
    var patch = {
      title: document.getElementById('wpEditTitle').value.trim(),
      platform: document.getElementById('wpEditPlatform').value,
      caption: document.getElementById('wpEditCaption').value,
      scheduled_at: sched ? new Date(sched).toISOString() : null
    };
    try {
      var r = await fetch('/api/auto-publish/update/'+id, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(patch) });
      var j = await r.json();
      if (j.ok){
        if(window.toast) toast('💾 已儲存','ok');
        document.getElementById('wpEditModal').style.display='none';
        await refreshCache();
        if(window.loadAll) setTimeout(loadAll,300); else enhance();
      } else {
        if(window.toast) toast('❌ '+(j.error||'儲存失敗'),'err'); else alert('儲存失敗：'+(j.error||''));
      }
    } catch(e){ if(window.toast) toast('❌ '+e.message,'err'); else alert(e.message); }
  }
  function init(){
    ensureModal();
    var area = document.getElementById('draftsArea');
    if(!area){ return setTimeout(init,500); }
    var run = async function(){ await refreshCache(); enhance(); };
    run();
    new MutationObserver(function(){ enhance(); }).observe(area,{childList:true,subtree:true});
    setInterval(run, 30000);
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', init); else init();
})();
</script>
<script>
/* === 卡片內就地編輯（覆寫彈窗版 openEditor） === */
(function(){
  function gid(card){var els=card.querySelectorAll("[onclick]");for(var i=0;i<els.length;i++){var m=(els[i].getAttribute("onclick")||"").match(/'(draft_[a-z0-9_]+)'/i);if(m)return m[1];}return null;}
  function findCard(id){var cards=document.querySelectorAll("#draftsArea .draft-card");for(var i=0;i<cards.length;i++){if(gid(cards[i])===id)return cards[i];}return null;}
  function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;");}
  function toLocalInput(iso){if(!iso)return "";var dt=new Date(iso);if(isNaN(dt))return "";var p=function(n){return String(n).padStart(2,"0");};return dt.getFullYear()+"-"+p(dt.getMonth()+1)+"-"+p(dt.getDate())+"T"+p(dt.getHours())+":"+p(dt.getMinutes());}
  async function getDraft(id){try{var j=await (await fetch("/api/auto-publish/drafts")).json();return (j.drafts||[]).find(function(d){return d.id===id;});}catch(e){return null;}}
  var _m=document.getElementById("wpEditModal"); if(_m) _m.style.display="none";
  window.openEditor=async function(id){
    var card=findCard(id); if(!card) return;
    var body=card.querySelector(".body"); if(!body) return;
    if(body.querySelector(".wp-inline-editor")) return;
    var d=await getDraft(id) || {};
    var lbl="display:block;color:#8B7278;font-size:11px;letter-spacing:1px;margin:8px 0 3px;";
    var inp="width:100%;box-sizing:border-box;padding:8px;border-radius:6px;border:1px solid #4A1D2E;background:#1C1213;color:#FCF6F5;font-size:13px;font-family:inherit;";
    body.innerHTML="<div class=\"wp-inline-editor\">"
      +"<label style=\""+lbl+"\">標題 / 分類標籤</label>"
      +"<input id=\"wpi-title\" type=\"text\" value=\""+esc(d.title||"")+"\" placeholder=\"例：母親節禮盒\" style=\""+inp+"\">"
      +"<label style=\""+lbl+"\">平台</label>"
      +"<select id=\"wpi-platform\" style=\""+inp+"\"><option value=\"IG\""+((d.platform!=="FB")?" selected":"")+">IG</option><option value=\"FB\""+((d.platform==="FB")?" selected":"")+">FB</option></select>"
      +"<label style=\""+lbl+"\">發布時間（到點自動發佈 FB/IG）</label>"
      +"<input id=\"wpi-sched\" type=\"datetime-local\" value=\""+toLocalInput(d.scheduled_at)+"\" style=\""+inp+"\">"
      +"<label style=\""+lbl+"\">貼文文字內容</label>"
      +"<textarea id=\"wpi-caption\" rows=\"8\" style=\""+inp+"resize:vertical;line-height:1.6;\">"+esc(d.caption||"")+"</textarea>"
      +"<div style=\"display:flex;gap:8px;margin-top:10px;\"><button class=\"btn primary wpi-save\" style=\"padding:6px 14px;font-size:12px;\">💾 儲存</button><button class=\"btn ghost wpi-cancel\" style=\"padding:6px 14px;font-size:12px;\">取消</button></div>"
      +"</div>";
    body.querySelector(".wpi-cancel").onclick=function(){ if(window.loadAll) loadAll(); };
    body.querySelector(".wpi-save").onclick=async function(){
      var sched=body.querySelector("#wpi-sched").value;
      var patch={title:body.querySelector("#wpi-title").value.trim(),platform:body.querySelector("#wpi-platform").value,caption:body.querySelector("#wpi-caption").value,scheduled_at:sched?new Date(sched).toISOString():null};
      try{var r=await fetch("/api/auto-publish/update/"+id,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(patch)});var jj=await r.json();if(jj.ok){if(window.toast)toast("💾 已儲存","ok");if(window.loadAll)setTimeout(loadAll,300);}else{if(window.toast)toast("❌ "+(jj.error||"儲存失敗"),"err");else alert(jj.error||"儲存失敗");}}catch(e){if(window.toast)toast("❌ "+e.message,"err");}
    };
    var capEl=body.querySelector("#wpi-caption"); if(capEl) capEl.focus();
  };
})();
</script>
</body>
