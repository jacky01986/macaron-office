<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>📋 線下報告中心 · 溫點 WarmPlace</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="/macaron-shared.css">
<style>
body{margin:0;padding:24px;background:transparent;color:#f4e8d4;font-family:'Noto Sans TC','PingFang TC',sans-serif;line-height:1.5}
.wrap{max-width:1280px;margin:0 auto}
h1{font-size:26px;margin:0 0 6px;color:#fff;display:flex;align-items:center;gap:12px}
.subtitle{color:#c9b89e;font-size:13px;margin:0 0 24px}
.grid{display:grid;gap:16px}.grid-4{grid-template-columns:repeat(4,1fr)}
@media(max-width:900px){.grid-4{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.grid-4{grid-template-columns:1fr}}
.card{background:linear-gradient(135deg,rgba(94,42,58,.45),rgba(58,21,33,.35));border:1px solid rgba(176,141,87,.32);border-radius:16px;padding:20px 22px}
.section{margin-top:28px}
.section-title{font-size:18px;color:#f4e8d4;margin:0 0 14px;display:flex;align-items:center;gap:10px;border-left:4px solid #B08D57;padding-left:10px;flex-wrap:wrap}
.stat-card{text-align:center}.stat-card .label{color:#d9c4a3;font-size:12px;letter-spacing:1px;margin-bottom:6px}.stat-card .value{font-size:30px;font-weight:700;color:#fff;line-height:1.1}
.pill{display:inline-block;background:rgba(176,141,87,.18);border:1px solid rgba(176,141,87,.35);color:#f4e8d4;border-radius:12px;padding:2px 8px;font-size:11px;margin-right:4px}
.pill.high{background:rgba(255,107,107,.2);color:#ffb3b3}.pill.medium{background:rgba(255,184,107,.2);color:#ffd59b}.pill.low{background:rgba(61,220,132,.15);color:#9bcdb1}
.pill.p1{background:rgba(255,107,107,.2);color:#ffb3b3}.pill.p2{background:rgba(255,184,107,.2);color:#ffd59b}.pill.p3{background:rgba(170,200,255,.15);color:#aac8ff}
.empty{color:#9c8973;font-size:13px;font-style:italic;padding:24px;text-align:center;background:rgba(0,0,0,.18);border-radius:10px;border:1px dashed rgba(176,141,87,.22)}
.toast{position:fixed;top:24px;right:24px;background:linear-gradient(135deg,#3ddc84,#2b9c5e);color:#0a2a16;padding:14px 22px;border-radius:12px;font-weight:600;display:none;z-index:1000;box-shadow:0 10px 30px rgba(0,0,0,.4)}
.toast.error{background:linear-gradient(135deg,#ff6b6b,#c5424a);color:#fff}.toast.info{background:linear-gradient(135deg,#4285f4,#2b6cd4);color:#fff}.toast.show{display:block}
.nav-tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.nav-tab{background:rgba(0,0,0,.28);border:1px solid rgba(176,141,87,.22);color:#e4d6bc;padding:8px 14px;border-radius:10px;text-decoration:none;font-size:13px;cursor:pointer}
.trend-bar{display:flex;align-items:end;gap:4px;height:80px;margin-top:8px}
.trend-bar > div{flex:1;background:linear-gradient(180deg,#d4a87e,#B08D57);border-radius:4px 4px 0 0;min-height:4px;position:relative}
.trend-bar .lbl{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:9px;color:#9c8973;white-space:nowrap}
.ts{font-size:11px;color:#9c8973}
.dropzone{border:2.5px dashed rgba(176,141,87,.55);border-radius:18px;padding:36px 28px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(0,0,0,.16)}
.dropzone:hover,.dropzone.drag{border-color:#d4a87e;background:rgba(212,168,126,.08)}
.dropzone .ic{font-size:44px}
.dropzone .big{color:#fff;font-size:17px;font-weight:600;margin:4px 0}
.dropzone .sub{color:#c9b89e;font-size:12px}
#file-input{display:none}
.process-banner{background:linear-gradient(135deg,rgba(66,133,244,.2),rgba(66,133,244,.1));border:1px solid rgba(66,133,244,.4);padding:14px 18px;border-radius:12px;margin-top:14px;display:none;align-items:center;gap:12px;color:#aac8ff}
.process-banner.show{display:flex}
.spinner{width:18px;height:18px;border:2px solid rgba(170,200,255,.3);border-top-color:#aac8ff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.btn{background:linear-gradient(135deg,#B08D57,#d4a87e);color:#3a1521;border:none;padding:10px 20px;border-radius:20px;font-weight:600;cursor:pointer;font-size:13px}
.btn-secondary{background:rgba(0,0,0,.28);color:#e4d6bc;border:1px solid rgba(176,141,87,.32)}
.btn-ai{background:linear-gradient(135deg,#4285f4,#2b6cd4);color:#fff;border:none;padding:10px 16px;border-radius:20px;font-weight:600;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:6px;margin:4px}
.btn-ai:disabled{opacity:.5;cursor:wait}
.btn-mini{background:none;border:1px solid rgba(176,141,87,.3);padding:3px 9px;border-radius:6px;font-size:10px;cursor:pointer;font-family:inherit;margin-left:4px;color:#d4a87e}
.btn-mini:hover{filter:brightness(1.2);background:rgba(176,141,87,.15)}
.btn-mini.danger{color:#ff6b6b;border-color:rgba(255,107,107,.4)}
.btn-mini.expand{color:#4285f4;border-color:rgba(66,133,244,.4)}
.btn-mini.ai{color:#aac8ff;border-color:rgba(170,200,255,.4)}
.upload-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:rgba(0,0,0,.2);border:1px solid rgba(176,141,87,.18);border-radius:10px;margin-bottom:6px;font-size:13px}
.upload-row .info{display:flex;flex-direction:column;gap:3px;min-width:0;flex:1}
.upload-row .fname{color:#fff;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.upload-row .meta{color:#9c8973;font-size:11px}
.branch-card{background:linear-gradient(135deg,rgba(94,42,58,.5),rgba(58,21,33,.35));border:1px solid rgba(176,141,87,.4);border-radius:14px;padding:0;margin-bottom:14px;overflow:hidden}
.branch-card summary{padding:18px 22px;list-style:none;display:flex;align-items:center;justify-content:space-between;gap:12px}
.branch-card summary::-webkit-details-marker{display:none}
.branch-card summary::after{content:'▶';color:#d4a87e;transition:transform .2s;margin-left:8px}
.branch-card[open] summary::after{transform:rotate(90deg)}
.bch-head-l{display:flex;flex-direction:column;gap:4px}
.bch-name{color:#fff;font-size:18px;font-weight:700}
.bch-meta{color:#c9b89e;font-size:12px}
.bch-head-r{display:flex;gap:14px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.bch-stat{text-align:right}
.bch-stat .v{color:#fff;font-weight:700;font-size:16px}
.bch-stat .l{color:#9c8973;font-size:10px;letter-spacing:.5px;text-transform:uppercase}
.bch-stat.warn .v{color:#ffb3b3}.bch-stat.good .v{color:#9bcdb1}
.branch-card .body{padding:0 22px 18px;border-top:1px solid rgba(176,141,87,.2)}
.bch-block{margin-top:14px}
.bch-block h4{margin:0 0 8px;font-size:13px;color:#d4a87e;letter-spacing:.5px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.month-table,.matrix-table{width:100%;border-collapse:collapse;font-size:12px;background:rgba(0,0,0,.18);border-radius:8px;overflow:hidden}
.month-table th,.matrix-table th{background:rgba(176,141,87,.18);text-align:left;padding:8px;color:#d4a87e;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.month-table td,.matrix-table td{padding:8px;border-top:1px solid rgba(176,141,87,.1);color:#e4d6bc;white-space:nowrap}
.month-table tr:hover td,.matrix-table tr:hover td{background:rgba(176,141,87,.06)}
.month-table .num,.matrix-table .num{text-align:right;color:#fff;font-weight:600}
.month-table .warn,.matrix-table .warn{color:#ffb3b3}
.month-table .good,.matrix-table .good{color:#9bcdb1}
.month-table tfoot td,.matrix-table tfoot td{background:rgba(176,141,87,.2);font-weight:700;border-top:2px solid rgba(176,141,87,.4)}
.month-table .target-input{background:rgba(0,0,0,.4);border:1px solid rgba(176,141,87,.3);color:#fff;padding:4px 6px;border-radius:6px;width:90px;font-family:inherit;font-size:12px;text-align:right}
.month-table .target-input:focus{outline:none;border-color:#d4a87e}
.ai-result{background:linear-gradient(135deg,rgba(66,133,244,.12),rgba(66,133,244,.04));border:1px solid rgba(66,133,244,.35);border-radius:12px;padding:14px;margin-top:10px;display:none}
.ai-result.show{display:block}
.ai-result h5{margin:14px 0 6px;color:#aac8ff;font-size:13px}
.ai-result h5:first-child{margin-top:0}
.ai-result .exec{color:#fff;font-size:14px;line-height:1.6;margin:0}
.ai-item{background:rgba(0,0,0,.22);border-left:3px solid #4285f4;padding:8px 12px;border-radius:6px;margin-bottom:6px}
.ai-item .ttl{color:#fff;font-weight:600;font-size:13px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ai-item .det{color:#c9b89e;font-size:12px;margin-top:4px}
.ai-item .imp{color:#9bcdb1;font-size:11px;margin-top:4px}
.ai-list{margin:0;padding-left:20px;color:#e4d6bc;font-size:13px}
.bar-cell{position:relative;height:18px;background:rgba(0,0,0,.3);border-radius:4px;overflow:hidden;min-width:80px}
.bar-cell .fill{position:absolute;top:0;left:0;height:100%;background:linear-gradient(90deg,#9bcdb1,#3ddc84)}
.bar-cell .fill.warn{background:linear-gradient(90deg,#ffd59b,#ff9b3d)}
.bar-cell .fill.bad{background:linear-gradient(90deg,#ffb3b3,#ff6b6b)}
.bar-cell .txt{position:absolute;left:0;right:0;top:0;line-height:18px;text-align:center;color:#fff;font-weight:700;font-size:11px}
.day-select-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:10px 0}
.day-select-row select,.day-select-row input{background:rgba(0,0,0,.4);border:1px solid rgba(176,141,87,.3);color:#fff;padding:6px 10px;border-radius:6px;font-family:inherit;font-size:13px}
</style></head>
<body>
<div class="wrap">
  <div><h1>📋 線下報告中心</h1><p class="subtitle">門市報告 · AI 自動萃取 · 全體月總和 / 跨店 / 單店 / 月份 / 單日 4 層分析</p></div>
  <div class="nav-tabs"><a class="nav-tab" href="/">← 主控台</a></div>
  <div class="card">
    <div class="dropzone" id="dropzone" onclick="document.getElementById('file-input').click()">
      <div class="ic">📤</div>
      <div class="big">點擊或拖放檔案到這裡</div>
      <div class="sub">PDF · 照片 · Excel · Word · CSV · TXT — 最大 25MB · 含每日資料的 Excel 上傳後請按「🔄 展開每日」</div>
      <input type="file" id="file-input" accept=".pdf,.png,.jpg,.jpeg,.xlsx,.xls,.csv,.txt,.md,.docx,image/*,application/pdf">
    </div>
    <div class="process-banner" id="proc-banner"><div class="spinner"></div><div><b>AI 分析中…</b> <span id="proc-msg">讀取檔案</span></div></div>
  </div>

  <div class="section grid grid-4">
    <div class="card stat-card"><div class="label">紀錄筆數</div><div class="value" id="kpi-count-30">—</div></div>
    <div class="card stat-card"><div class="label">總營收</div><div class="value">NT$<span id="kpi-rev-30">—</span></div></div>
    <div class="card stat-card"><div class="label">門市數</div><div class="value" id="kpi-branches">—</div></div>
    <div class="card stat-card"><div class="label">總問題數</div><div class="value" id="kpi-problems">—</div></div>
  </div>

  <div class="section"><div class="card"><div class="section-title" style="margin-top:0">📁 已上傳檔案管理(刪除一份檔案會移除其所有展開紀錄)</div><div id="uploads-list"></div></div></div>

  <div class="section"><div class="card"><div class="section-title" style="margin-top:0">🌐 全體月份總和(各月 × 各門市)<button class="btn-ai" onclick="getAnalysis('all',this,'all-stores')" style="margin-left:auto">🤖 全體跨店 AI 分析</button></div><div id="all-stores-matrix"></div><div class="ai-result" id="ai-all-stores"></div></div></div>

  <div class="section"><div class="card"><div class="section-title" style="margin-top:0">📈 14 日營收趨勢</div><div class="trend-bar" id="trend-bar"></div></div></div>

  <div class="section"><div class="section-title">🏪 各門市詳情</div><div id="branch-detail-list"></div></div>

  <p class="ts" id="ts-stamp" style="text-align:center;margin-top:30px"></p>
</div>
<div class="toast" id="toast"></div>
<script>
const $=id=>document.getElementById(id);
const esc=s=>String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmt=n=>(n||0).toLocaleString();
function toast(msg,err,info){const t=$('toast');t.textContent=msg;t.className='toast show'+(err?' error':(info?' info':''));setTimeout(()=>t.classList.remove('show'),4500);}
const dz=$('dropzone');
['dragenter','dragover'].forEach(e=>dz.addEventListener(e,ev=>{ev.preventDefault();dz.classList.add('drag');}));
['dragleave','drop'].forEach(e=>dz.addEventListener(e,ev=>{ev.preventDefault();dz.classList.remove('drag');}));
dz.addEventListener('drop',ev=>{const f=ev.dataTransfer.files[0];if(f)uploadFile(f);});
$('file-input').addEventListener('change',ev=>{const f=ev.target.files[0];if(f)uploadFile(f);});
async function uploadFile(file){
  if(file.size>25*1024*1024){toast('檔案太大,上限 25MB',true);return;}
  $('proc-banner').classList.add('show');$('proc-msg').textContent='上傳 '+file.name;
  try{
    const fd=new FormData();fd.append('file',file);
    $('proc-msg').textContent='AI 讀取中… (10-30 秒)';
    const r=await fetch('/api/offline-reports/upload-file',{method:'POST',body:fd});const d=await r.json();
    $('proc-banner').classList.remove('show');
    if(!d.ok)throw new Error(d.error);toast('✅ 已分析存入');await loadAll();
  }catch(e){$('proc-banner').classList.remove('show');toast('❌ '+e.message,true);}
}
async function loadAll(){
  try{
    const [sum,ups]=await Promise.all([fetch('/api/offline-reports/summary').then(r=>r.json()),fetch('/api/offline-reports/uploads').then(r=>r.json())]);
    if(!sum.ok)throw new Error(sum.error);
    renderUploads(ups.uploads||[]);
    renderSummary(sum);
    $('ts-stamp').textContent='最後更新: '+new Date().toLocaleString('zh-TW');
  }catch(e){toast('載入失敗: '+e.message,true);}
}
function renderUploads(ups){
  if(ups.length===0){$('uploads-list').innerHTML='<div class="empty">尚無上傳檔案</div>';return;}
  $('uploads-list').innerHTML=ups.map(u=>'<div class="upload-row"><div class="info"><div class="fname">📄 '+esc(u.source_file)+(u.has_expanded?' <span class="pill" style="background:rgba(66,133,244,.2);color:#aac8ff">已展開每日</span>':'')+'</div><div class="meta">'+(u.branch?esc(u.branch)+' · ':'')+u.count+' 筆紀錄 · NT$'+fmt(u.total_revenue)+' · '+esc(u.first_date)+(u.first_date!==u.last_date?' ~ '+esc(u.last_date):'')+'</div></div><div><button class="btn-mini danger" onclick="deleteUpload(\''+u.upload_id+'\','+u.count+')">🗑️ 刪除此檔案及 '+u.count+' 筆</button></div></div>').join('');
}
async function deleteUpload(uploadId,count){
  if(!confirm('確定刪除此檔案及其 '+count+' 筆紀錄?無法復原'))return;
  try{const r=await fetch('/api/offline-reports/upload/'+uploadId,{method:'DELETE'});const d=await r.json();
    if(!d.ok)throw new Error(d.error);toast('✅ 已刪除 '+d.removed_count+' 筆');await loadAll();
  }catch(e){toast('❌ '+e.message,true);}
}
async function reanalyzeReport(id){
  if(!confirm('重讀此檔案並展開為每日紀錄,需 30-60 秒,確定?'))return;
  toast('🔄 AI 展開中…',false,true);
  try{const r=await fetch('/api/offline-reports/reanalyze/'+id,{method:'POST'});const d=await r.json();
    if(!d.ok)throw new Error(d.error);toast('✅ 展開為 '+d.expanded_to+' 筆每日');await loadAll();
  }catch(e){toast('❌ '+e.message,true);}
}
async function saveTarget(branch,month,value,el){
  try{el.disabled=true;const r=await fetch('/api/offline-reports/targets',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({branch,month,target:Number(value)||0})});const d=await r.json();
    if(!d.ok)throw new Error(d.error);toast('✅ 目標已存');await loadAll();
  }catch(e){toast('❌ '+e.message,true);el.disabled=false;}
}
function renderSummary(s){
  $('kpi-count-30').textContent=fmt(s.total_reports);$('kpi-rev-30').textContent=fmt(s.revenue_30);$('kpi-branches').textContent=(s.all_branches||[]).length;$('kpi-problems').textContent=fmt(s.problem_count);
  const trend=s.revenue_trend||[];const max=Math.max(...trend.map(t=>t.revenue),1);
  $('trend-bar').innerHTML=trend.length?trend.map(t=>'<div style="height:'+(t.revenue/max*100).toFixed(0)+'%" title="'+t.date+': NT$'+fmt(t.revenue)+'"><span class="lbl">'+t.date.slice(5)+'</span></div>').join(''):'';
  renderAllStoresMatrix(s.by_month_all_stores||[],s.all_branches||[]);
  renderBranches(s.by_branch||[]);
}
function renderAllStoresMatrix(rows,branches){
  if(rows.length===0||branches.length===0){$('all-stores-matrix').innerHTML='<div class="empty">尚無月份資料 — 上傳含日期的報告</div>';return;}
  let html='<div style="overflow-x:auto"><table class="matrix-table"><thead><tr><th>月份</th>';
  branches.forEach(b=>{html+='<th class="num">'+esc(b)+'</th>';});
  html+='<th class="num">月總計</th></tr></thead><tbody>';
  rows.forEach(r=>{
    html+='<tr><td><b>'+esc(r.month)+'</b></td>';
    branches.forEach(b=>{const cell=r.by_branch[b];html+='<td class="num">'+(cell&&cell.revenue?'NT$'+fmt(cell.revenue):'—')+'</td>';});
    html+='<td class="num good">NT$'+fmt(r.total_revenue)+'</td></tr>';
  });
  // grand total row
  const grandPerBranch={};branches.forEach(b=>grandPerBranch[b]=0);let grand=0;
  rows.forEach(r=>{branches.forEach(b=>{grandPerBranch[b]+=(r.by_branch[b]?.revenue||0);});grand+=r.total_revenue;});
  html+='</tbody><tfoot><tr><td>累計</td>';
  branches.forEach(b=>{html+='<td class="num">NT$'+fmt(grandPerBranch[b])+'</td>';});
  html+='<td class="num">NT$'+fmt(grand)+'</td></tr></tfoot></table></div>';
  $('all-stores-matrix').innerHTML=html;
}
function pctClass(p){if(p===null)return '';if(p>=100)return 'good';if(p>=80)return 'meh';return 'bad';}
function renderBranches(branches){
  if(branches.length===0){$('branch-detail-list').innerHTML='<div class="empty">尚無門市資料</div>';return;}
  $('branch-detail-list').innerHTML=branches.map((b,idx)=>{
    const months=b.by_month||[];
    const reports=(b.reports||[]).slice().sort((a,c)=>(c.date||'').localeCompare(a.date||''));
    const enc=encodeURIComponent(b.branch);
    const branchId='br_'+idx;
    const overallPct=b.overall_achievement_pct;
    const overallCls=overallPct===null?'':pctClass(overallPct);
    const monthsHtml=months.length===0?'':'<div class="bch-block"><h4>📅 月份明細 ('+months.length+' 個月) · 點月份取得「該月 AI 分析」</h4><div style="overflow-x:auto"><table class="month-table"><thead><tr><th>月份</th><th class="num">目標</th><th class="num">營收</th><th>達成率</th><th class="num">訂單</th><th class="num">客單價</th><th class="num">紀錄</th><th class="num">問題</th><th>AI</th></tr></thead><tbody>'+months.map(m=>{
      const pct=m.achievement_pct;
      const barClass=pct===null?'':(pct>=100?'':(pct>=80?'warn':'bad'));
      const barWidth=pct===null?0:Math.min(pct,100);
      const barTxt=pct===null?'未設':(pct.toFixed(1)+'%');
      return '<tr><td><b>'+esc(m.month)+'</b></td><td class="num"><input type="number" class="target-input" value="'+(m.target||'')+'" placeholder="設定" data-branch="'+esc(b.branch)+'" data-month="'+m.month+'" data-orig="'+(m.target||'')+'" onkeydown="if(event.key===\'Enter\')saveTarget(this.dataset.branch,this.dataset.month,this.value,this)" onblur="if(this.value!=this.dataset.orig)saveTarget(this.dataset.branch,this.dataset.month,this.value,this)"></td><td class="num">NT$'+fmt(m.revenue)+'</td><td><div class="bar-cell"><div class="fill '+barClass+'" style="width:'+barWidth+'%"></div><div class="txt">'+barTxt+'</div></div></td><td class="num">'+fmt(m.orders)+'</td><td class="num">'+(m.avg_order_value?'NT$'+fmt(m.avg_order_value):'—')+'</td><td class="num">'+m.count+'</td><td class="num '+(m.problems_count>0?'warn':'')+'">'+m.problems_count+'</td><td><button class="btn-mini ai" onclick="getAnalysis(\'month\',this,\''+branchId+'_'+m.month+'\',\''+enc+'\',\''+m.month+'\')">📅 月分析</button></td></tr>';
    }).join('')+'</tbody></table></div><div class="ai-result" id="ai-'+branchId+'_month"></div></div>';
    // daily selector
    const uniqueDates=[...new Set(reports.map(r=>r.date))].sort().reverse();
    const dayPickerHtml=uniqueDates.length===0?'':'<div class="bch-block"><h4>📆 單日分析(選日期取得當日 AI)</h4><div class="day-select-row"><label style="color:#9c8973;font-size:12px">選擇日期:</label><select id="daysel_'+branchId+'">'+uniqueDates.map(d=>'<option>'+d+'</option>').join('')+'</select><button class="btn-mini ai" onclick="getDayAnalysisFromSelect(\''+enc+'\',\''+branchId+'\')">📆 取得單日分析</button></div><div class="ai-result" id="ai-'+branchId+'_day"></div></div>';
    // reports list (last 20)
    const reportsHtml=reports.slice(0,20).map(r=>{
      const att=r.attachment_url?'<a class="ts" href="'+r.attachment_url+'" target="_blank">📎</a>':'';
      const expandBtn=(r.attachment_url&&!r.expanded_from)?'<button class="btn-mini expand" onclick="reanalyzeReport(\''+r.id+'\')">🔄 展開每日</button>':'';
      return '<div style="padding:6px 0;border-bottom:1px dashed rgba(176,141,87,.15);font-size:12px;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap"><div>'+esc(r.date)+' · NT$'+fmt(r.revenue)+(r.orders?' / '+r.orders+' 單':'')+(r.summary?' · '+esc(r.summary).slice(0,40):'')+'</div><div>'+att+expandBtn+'</div></div>';
    }).join('');
    return '<details class="branch-card"'+(idx<2?' open':'')+'><summary><div class="bch-head-l"><div class="bch-name">🏪 '+esc(b.branch)+'</div><div class="bch-meta">'+b.count+' 筆紀錄'+(b.total_orders?' · '+fmt(b.total_orders)+' 單':'')+(months.length?' · '+months.length+' 個月':'')+(b.avg_order_value?' · 客單價 NT$'+fmt(b.avg_order_value):'')+'</div></div><div class="bch-head-r"><div class="bch-stat"><div class="v">NT$'+fmt(b.revenue)+'</div><div class="l">累計營收</div></div>'+(b.total_target>0?'<div class="bch-stat '+overallCls+'"><div class="v">'+(overallPct!==null?overallPct.toFixed(1)+'%':'—')+'</div><div class="l">整體達成</div></div>':'')+'</div></summary><div class="body">'+monthsHtml+dayPickerHtml+'<div class="bch-block"><h4>🏪 整家店 AI 深度分析 <button class="btn-ai" onclick="getAnalysis(\'branch\',this,\''+branchId+'_store\',\''+enc+'\')">🤖 取得整家店分析</button></h4><div class="ai-result" id="ai-'+branchId+'_store"></div></div><div class="bch-block"><h4>📑 最近 20 筆紀錄 (共 '+reports.length+' 筆)</h4>'+reportsHtml+'</div></div></details>';
  }).join('');
}
async function getDayAnalysisFromSelect(branchEnc,branchId){
  const sel=$('daysel_'+branchId);if(!sel||!sel.value)return;
  const btn=sel.nextElementSibling;
  await getAnalysis('day',btn,branchId+'_day',branchEnc,sel.value);
}
async function getAnalysis(scope,btn,targetSlot,branchEnc,extra){
  btn.disabled=true;const orig=btn.innerHTML;btn.innerHTML='<span class="spinner" style="width:14px;height:14px;border-width:2px"></span> 分析中…';
  let url='';
  if(scope==='all')url='/api/offline-reports/analysis/all-stores';
  else if(scope==='branch')url='/api/offline-reports/analysis/branch/'+branchEnc;
  else if(scope==='month')url='/api/offline-reports/analysis/month/'+branchEnc+'/'+extra;
  else if(scope==='day')url='/api/offline-reports/analysis/day/'+branchEnc+'/'+extra;
  try{
    const r=await fetch(url);const d=await r.json();
    if(!d.ok)throw new Error(d.error||'analysis failed');
    const a=d.analysis||{};let html='';
    if(a.executive_summary)html+='<h5>📌 執行摘要</h5><p class="exec">'+esc(a.executive_summary)+'</p>';
    if(a.key_insights)html+='<h5>🔍 關鍵觀察</h5><p>'+esc(a.key_insights)+'</p>';
    if(Array.isArray(a.top_issues)&&a.top_issues.length){html+='<h5>🚨 核心問題</h5>';a.top_issues.forEach(i=>{html+='<div class="ai-item"><div class="ttl">'+esc(i.issue||'')+' <span class="pill '+(i.severity||'medium').toLowerCase()+'">'+esc(i.severity||'')+'</span></div>'+(i.root_cause?'<div class="det">'+esc(i.root_cause)+'</div>':'')+'</div>';});}
    if(Array.isArray(a.recommendations)&&a.recommendations.length){html+='<h5>💡 改善建議</h5>';a.recommendations.forEach(r=>{html+='<div class="ai-item"><div class="ttl"><span class="pill '+(r.priority||'p2').toLowerCase()+'">'+esc(r.priority||'')+'</span>'+esc(r.title||'')+'</div>'+(r.detail?'<div class="det">'+esc(r.detail)+'</div>':'')+(r.expected_impact?'<div class="imp">↑ '+esc(r.expected_impact)+'</div>':'')+'</div>';});}
    if(Array.isArray(a.quick_wins)&&a.quick_wins.length)html+='<h5>⚡ 立刻可做</h5><ul class="ai-list">'+a.quick_wins.map(q=>'<li>'+esc(q)+'</li>').join('')+'</ul>';
    if(Array.isArray(a.watch_outs)&&a.watch_outs.length)html+='<h5>⚠️ 風險注意</h5><ul class="ai-list">'+a.watch_outs.map(q=>'<li>'+esc(q)+'</li>').join('')+'</ul>';
    if(!html)html='<p style="color:#9c8973">無內容</p>';
    const target=$('ai-'+targetSlot);target.innerHTML=html;target.classList.add('show');
    btn.innerHTML=orig;btn.disabled=false;toast('✅ 分析完成');
  }catch(e){toast('❌ '+e.message,true);btn.innerHTML=orig;btn.disabled=false;}
}
loadAll();
</script>
