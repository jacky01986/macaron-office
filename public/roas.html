<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<title>📈 ROAS 兩層 — MACARON DE LUXE</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root { --brand:#6B4226; --bg:#FAF7F2; --ink:#3B2A1F; --line:#E5DACB; --green:#10b981; --yellow:#f59e0b; --red:#ef4444; --blue:#3b82f6; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--ink); margin: 0; }
  .topnav { position: fixed; top: 0; left: 0; right: 0; background: linear-gradient(135deg,#6B4226,#8B5A33); padding: 8px 16px; display: flex; gap: 8px; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.15); overflow-x: auto; white-space: nowrap; align-items: center; }
  .topnav strong { color:#FAF7F2; font-size:14px; margin-right:8px; flex-shrink:0; }
  .topnav a { padding:6px 12px; border-radius:6px; text-decoration:none; font-size:13px; font-weight:600; flex-shrink:0; background:#FAF7F2; color:#6B4226; }
  .topnav .active { background:#3b82f6; color:white; }
  .container { max-width: 1100px; margin: 0 auto; padding: 70px 20px 40px; }
  h1 { font-size: 22px; margin: 0 0 4px; color: var(--brand); }
  .subtitle { color: #666; margin-bottom: 20px; font-size: 14px; }
  .controls { display: flex; gap: 8px; margin-bottom: 20px; align-items:center; }
  .btn { padding: 6px 14px; border: 1px solid var(--line); background: white; color: var(--brand); border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
  .btn.active { background: var(--brand); color: white; border-color: var(--brand); }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-bottom: 20px; }
  .stat { background: white; border: 1px solid var(--line); border-radius: 12px; padding: 18px; text-align: center; }
  .stat .label { font-size: 12px; color: #888; margin-bottom: 6px; }
  .stat .value { font-size: 28px; font-weight: 700; color: var(--brand); }
  .stat .sub { font-size: 11px; color: #aaa; margin-top: 4px; }
  .health-banner { padding: 14px 18px; border-radius: 10px; margin-bottom: 20px; font-size: 14px; }
  .health-banner.great { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
  .health-banner.healthy { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
  .health-banner.red { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
  .health-banner.no_data { background: #f3f4f6; color: #6b7280; border: 1px solid #d1d5db; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
  .card { background: white; border: 1px solid var(--line); border-radius: 12px; padding: 16px; }
  .card h2 { font-size: 16px; margin: 0 0 12px; color: var(--brand); }
  .card .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed var(--line); font-size: 13px; }
  .card .row:last-child { border-bottom: none; }
  .badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge.great { background: #d1fae5; color: #065f46; }
  .badge.healthy { background: #fef3c7; color: #92400e; }
  .badge.red { background: #fee2e2; color: #991b1b; }
  .badge.no_data { background: #e5e7eb; color: #6b7280; }
  .empty { text-align: center; color: #aaa; padding: 30px 16px; font-size: 13px; }
  .insight { background: linear-gradient(135deg, #dbeafe, #bfdbfe); padding: 14px 18px; border-radius: 10px; margin-bottom: 20px; font-size: 14px; line-height: 1.6; color: #1e40af; }
</style>
</head>
<body>

<div class="topnav">
  <strong>MACARON</strong>
  <a href="/">← 主辦公室</a>
  <a href="#" class="active">📈 ROAS 兩層</a>
  <a href="/conversion.html">💰 成交</a>
  <a href="/scout.html">🔍 SCOUT</a>
  <a href="/actions.html">⚡ 行動建議</a>
</div>

<div class="container">
  <h1>📈 ROAS 兩層即時數據</h1>
  <div class="subtitle">第一層：詢問轉換 (Lead) · 第二層：LINE 加好友 (High Intent Lead)</div>

  <div class="controls">
    <button class="btn" data-days="1" onclick="setDays(1)">昨天</button>
    <button class="btn active" data-days="7" onclick="setDays(7)">過去 7 天</button>
    <button class="btn" data-days="30" onclick="setDays(30)">過去 30 天</button>
    <button class="btn" onclick="loadData()" style="margin-left:auto">🔄 重新載入</button>
  </div>

  <div class="health-banner no_data" id="banner">載入中...</div>

  <div class="stats">
    <div class="stat"><div class="label">💰 廣告花費</div><div class="value" id="spend">--</div><div class="sub">NT$</div></div>
    <div class="stat"><div class="label">🟡 詢問數 (Lead)</div><div class="value" id="leads">--</div><div class="sub">Messenger + FB 留言</div></div>
    <div class="stat"><div class="label">🟢 新加 LINE 好友</div><div class="value" id="followers">--</div><div class="sub">高意願客</div></div>
    <div class="stat"><div class="label">📊 Cost per Lead</div><div class="value" id="cpl">--</div><div class="sub" id="cplSub">NT$ / 詢問</div></div>
    <div class="stat"><div class="label">📊 Cost per LINE</div><div class="value" id="cpf">--</div><div class="sub" id="cpfSub">NT$ / 加好友</div></div>
  </div>

  <div class="insight" id="insight">分析載入中...</div>

  <div class="grid">
    <div class="card">
      <h2>🟡 詢問來源拆解</h2>
      <div id="leadBreakdown"><div class="empty">載入中...</div></div>
    </div>
    <div class="card">
      <h2>🟢 LINE 好友趨勢（每日）</h2>
      <div id="lineBreakdown"><div class="empty">載入中...</div></div>
    </div>
  </div>
</div>

<script>
function escapeHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
let currentDays = 7;

function setDays(days) {
  currentDays = days;
  document.querySelectorAll('.btn[data-days]').forEach(b => b.classList.toggle('active', parseInt(b.dataset.days) === days));
  loadData();
}

function healthLabel(h) {
  if (h === 'great') return '🟢 優秀';
  if (h === 'healthy') return '🟡 健康';
  if (h === 'red') return '🔴 紅燈';
  return '⚪ 無資料';
}

async function loadData() {
  document.getElementById('banner').textContent = '載入中（每次約 5-10 秒）...';
  document.getElementById('banner').className = 'health-banner no_data';
  try {
    const [today, lineStats] = await Promise.all([
      fetch('/api/roas/today?days=' + currentDays).then(r => r.json()),
      fetch('/api/roas/line?days=' + currentDays).then(r => r.json()),
    ]);
    if (!today.ok) throw new Error(today.error || 'unknown');

    document.getElementById('spend').textContent = (today.ad_spend_ntd || 0).toLocaleString();
    document.getElementById('leads').textContent = today.lead_count || 0;
    document.getElementById('followers').textContent = today.new_followers || 0;
    document.getElementById('cpl').textContent = today.cost_per_lead_ntd || 0;
    document.getElementById('cpf').textContent = today.cost_per_follower_ntd || 0;

    const cplH = today.benchmark.cpl_health;
    const cpfH = today.benchmark.cpf_health;
    document.getElementById('cplSub').innerHTML = 'NT$ / 詢問 <span class="badge ' + cplH + '">' + healthLabel(cplH) + '</span>';
    document.getElementById('cpfSub').innerHTML = 'NT$ / 加好友 <span class="badge ' + cpfH + '">' + healthLabel(cpfH) + '</span>';

    // Banner
    const worst = (cpfH === 'red' || cplH === 'red') ? 'red' : (cpfH === 'healthy' || cplH === 'healthy' ? 'healthy' : (cpfH === 'no_data' && cplH === 'no_data' ? 'no_data' : 'great'));
    let msg = '';
    if (worst === 'red') msg = '🔴 警示：' + (cpfH === 'red' ? 'CPF 過高' : '') + (cplH === 'red' ? (cpfH === 'red' ? ' + ' : '') + 'CPL 過高' : '') + ' — 建議暫停廣告 + 重做素材';
    else if (worst === 'healthy') msg = '🟡 健康範圍 — 持續監控，無需急著加預算';
    else if (worst === 'great') msg = '🟢 優秀！可考慮加預算';
    else msg = '⚪ 無資料 — 檢查 Meta token 權限（pages_messaging）+ LINE token 是否有效';
    document.getElementById('banner').textContent = msg;
    document.getElementById('banner').className = 'health-banner ' + worst;

    // Insight
    let insight = '<strong>📊 分析：</strong>';
    if (today.lead_count === 0 && today.new_followers === 0) {
      insight += '近 ' + currentDays + ' 天 0 詢問 0 加好友 — 廣告完全沒導流到 LINE/Messenger，問題在素材或 CTA 設計';
    } else if (today.new_followers === 0) {
      insight += '有 ' + today.lead_count + ' 個詢問但 0 個加 LINE — 落地頁 / CTA 沒有引導加 LINE，立刻調整';
    } else if (today.lead_count === 0) {
      insight += today.new_followers + ' 人加 LINE 但 0 詢問 — LINE 加好友是來源不明（可能不是廣告帶來）';
    } else {
      const conv = (today.new_followers / today.lead_count * 100).toFixed(1);
      insight += today.lead_count + ' 詢問 → ' + today.new_followers + ' 加 LINE（轉換率 ' + conv + '%）';
      if (parseFloat(conv) < 30) insight += ' · 詢問→LINE 轉換率偏低（< 30%），客服回覆可能太慢或話術不夠強';
      else if (parseFloat(conv) > 60) insight += ' · 轉換率優秀！';
    }
    document.getElementById('insight').innerHTML = insight;

    // Lead breakdown
    document.getElementById('leadBreakdown').innerHTML =
      '<div class="row"><span>📩 Messenger 新對話</span><strong>' + (today.breakdown.messenger_new_conversations || 0) + '</strong></div>' +
      '<div class="row"><span>💬 FB 詢問留言</span><strong>' + (today.breakdown.fb_inquiry_comments || 0) + '</strong></div>' +
      '<div class="row"><span><strong>合計 Lead</strong></span><strong>' + today.lead_count + '</strong></div>';

    // Line breakdown
    if (lineStats.ok && lineStats.samples) {
      document.getElementById('lineBreakdown').innerHTML = lineStats.samples.slice(0, 10).map(s =>
        '<div class="row"><span>' + s.date.slice(0,4)+'-'+s.date.slice(4,6)+'-'+s.date.slice(6,8) + '</span><span>' + (typeof s.followers === 'number' ? s.followers + ' 人' : '⚠️ ' + (s.error||'').slice(0,30)) + '</span></div>'
      ).join('');
    } else {
      document.getElementById('lineBreakdown').innerHTML = '<div class="empty">LINE 資料不可用：' + escapeHtml(lineStats.error || 'unknown') + '</div>';
    }
  } catch (e) {
    document.getElementById('banner').textContent = '⚠️ 載入失敗：' + e.message;
    document.getElementById('banner').className = 'health-banner red';
  }
}

loadData();
</script>

</body>
</html>
