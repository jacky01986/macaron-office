<\!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ 廣告自動體檢 · MACARON DE LUXE</title>
<style>
  :root {
    --burgundy: #6D2E46;
    --burgundy-dark: #4A1F30;
    --gold: #B08D57;
    --gold-bright: #E8B54B;
    --ivory: #FCF6F5;
    --dark: #0E0A0C;
    --dark-2: #1A1416;
    --dark-3: #251D20;
    --muted: #8B7278;
    --amber: #E8B54B;
    --green: #6FBF7E;
    --red: #C76B6B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--dark); color: var(--ivory);
    font-family: -apple-system, "PingFang TC", "Noto Sans TC", sans-serif;
    min-height: 100vh; padding: 20px;
  }
  .container { max-width: 900px; margin: 0 auto; }
  .header {
    border-bottom: 1px solid var(--burgundy);
    padding-bottom: 16px; margin-bottom: 24px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .header h1 {
    font-family: Georgia, serif; font-size: 22px;
    color: var(--gold); letter-spacing: 2px; font-weight: normal;
  }
  .header .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .header a { color: var(--gold); text-decoration: none; font-size: 12px; padding: 6px 12px; border: 1px solid var(--burgundy); border-radius: 6px; }
  .header a:hover { background: var(--burgundy-dark); }
  .controls {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    background: var(--dark-2); padding: 14px; border-radius: 10px;
    border: 1px dashed var(--burgundy); margin-bottom: 20px;
  }
  .controls label { font-size: 11px; color: var(--muted); display: flex; flex-direction: column; gap: 4px; }
  .controls input {
    background: var(--dark-3); border: 1px solid var(--burgundy-dark);
    color: var(--ivory); padding: 6px 8px; border-radius: 4px; width: 70px;
    font-size: 12px; font-family: inherit;
  }
  .scan-btn {
    background: var(--burgundy); color: var(--gold);
    border: 1px solid var(--gold); border-radius: 6px;
    padding: 8px 18px; cursor: pointer;
    font-size: 13px; letter-spacing: 1px; font-family: Georgia, serif;
    margin-left: auto;
  }
  .scan-btn:hover { background: var(--burgundy-dark); }
  .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .status {
    padding: 12px; background: var(--dark-2); border-radius: 8px;
    border-left: 3px solid var(--gold); margin-bottom: 16px;
    font-size: 13px; color: var(--ivory); line-height: 1.6;
    min-height: 24px;
  }
  .results { display: grid; gap: 12px; }
  .ad-card {
    background: var(--dark-2); border: 1px solid var(--burgundy-dark);
    border-radius: 10px; padding: 16px;
    transition: opacity 0.3s;
  }
  .ad-card.done { opacity: 0.4; }
  .ad-name {
    font-size: 14px; color: var(--ivory); font-weight: 600;
    margin-bottom: 6px; word-break: break-all;
  }
  .ad-meta {
    font-size: 11px; color: var(--muted); margin-bottom: 10px;
    display: flex; gap: 16px; flex-wrap: wrap;
  }
  .ad-meta strong { color: var(--gold); }
  .reasons {
    background: rgba(199, 107, 107, 0.08);
    border-left: 3px solid var(--red);
    padding: 10px 12px; border-radius: 4px; margin-bottom: 10px;
  }
  .reasons li { font-size: 12px; color: var(--amber); margin-left: 18px; line-height: 1.7; }
  .saving {
    color: var(--gold); font-size: 12px; margin-bottom: 12px;
    background: rgba(232, 181, 75, 0.08); padding: 6px 10px; border-radius: 4px;
  }
  .actions { display: flex; gap: 8px; }
  .btn-confirm {
    flex: 1; padding: 10px 14px; cursor: pointer;
    background: var(--gold); color: var(--burgundy);
    border: none; border-radius: 6px;
    font-size: 13px; font-weight: 600;
  }
  .btn-confirm:hover { background: var(--gold-bright); }
  .btn-confirm:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-skip {
    padding: 10px 14px; cursor: pointer;
    background: transparent; color: var(--muted);
    border: 1px solid var(--burgundy); border-radius: 6px;
    font-size: 13px;
  }
  .btn-skip:hover { color: var(--ivory); border-color: var(--gold); }
  .empty {
    text-align: center; padding: 40px 20px;
    color: var(--muted); font-size: 13px;
    background: var(--dark-2); border-radius: 10px;
  }
  .log-section {
    margin-top: 30px; padding-top: 20px;
    border-top: 1px solid var(--burgundy-dark);
  }
  .log-section h3 { font-size: 14px; color: var(--gold); letter-spacing: 1px; margin-bottom: 10px; font-family: Georgia, serif; font-weight: normal; }
  .log-item {
    font-size: 11px; color: var(--muted); padding: 8px 12px;
    background: var(--dark-2); border-radius: 4px; margin-bottom: 4px;
    display: flex; justify-content: space-between; gap: 10px;
    line-height: 1.5;
  }
  .log-item.ok { border-left: 2px solid var(--green); }
  .log-item.fail { border-left: 2px solid var(--red); }
  .toast {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--burgundy); color: var(--ivory);
    padding: 12px 18px; border-radius: 6px; border: 1px solid var(--gold);
    font-size: 13px; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
    max-width: 80vw;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>⚡ 廣告自動體檢</h1>
      <div class="sub">Phase 1 · 半自動暫停表現差的廣告（提議 → 你確認 → 系統執行）</div>
    </div>
    <a href="/">← 回主辦公室</a>
  </div>

  <div class="controls">
    <label>ROAS 低於<input id="th-roas" type="number" step="0.1" value="0.8"></label>
    <label>CTR 低於 (%)<input id="th-ctr" type="number" step="0.1" value="0.5"></label>
    <label>CPM 高於<input id="th-cpm" type="number" step="10" value="250"></label>
    <label>最少天數<input id="th-age" type="number" step="1" value="3"></label>
    <label>最少花費<input id="th-spend" type="number" step="100" value="1000"></label>
    <button id="scan-btn" class="scan-btn">📋 掃描廣告</button>
  </div>

  <div id="status" class="status">點上方「掃描廣告」開始體檢。</div>

  <div id="results" class="results"></div>

  <div class="log-section">
    <h3>📜 最近執行紀錄</h3>
    <div id="log-list"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const $ = id => document.getElementById(id);

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])
  );
}

function toast(msg, ms = 3000) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), ms);
}

async function scan() {
  const btn = $('scan-btn');
  const status = $('status');
  const results = $('results');
  btn.disabled = true;
  status.innerHTML = '🔍 掃描中...（從 Meta 抓近 7 天廣告 + 套用 guardrail）';
  results.innerHTML = '';

  const params = new URLSearchParams({
    roas: $('th-roas').value || 0.8,
    ctr: $('th-ctr').value || 0.5,
    cpm: $('th-cpm').value || 250,
    minAgeDays: $('th-age').value || 3,
    minSpend: $('th-spend').value || 1000,
    max: 10,
  });

  try {
    const res = await fetch('/api/optimize/propose-pauses?' + params.toString());
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    if (\!data.proposalCount) {
      status.innerHTML = `✅ 掃描了 <strong>${data.totalAdsScanned}</strong> 個廣告，<strong>沒有</strong>需要暫停的（恭喜，廣告體質健康）。`;
      results.innerHTML = '<div class="empty">沒有發現問題廣告。</div>';
      return;
    }

    status.innerHTML = `⚠️ 掃描 <strong>${data.totalAdsScanned}</strong> 個廣告，找到 <strong>${data.proposalCount}</strong> 個建議暫停（請逐一確認）。`;
    results.innerHTML = data.proposals.map((p, i) => `
      <div class="ad-card" data-ad="${escapeHtml(p.adId)}">
        <div class="ad-name">${escapeHtml(p.adName || '(未命名)')}</div>
        <div class="ad-meta">
          <span>已運行 <strong>${p.ageDays ?? '-'}</strong> 天</span>
          <span>已花 <strong>NT$${Math.round(p.spend)}</strong></span>
          <span>ROAS <strong>${p.roas \!= null ? p.roas.toFixed(2) : 'N/A'}</strong></span>
          <span>CTR <strong>${p.ctr.toFixed(2)}%</strong></span>
          <span>CPM <strong>NT$${Math.round(p.cpm)}</strong></span>
          <span>轉換 <strong>${p.purchases}</strong> 筆</span>
        </div>
        <ul class="reasons">
          ${p.reasons.map(r => `<li>${escapeHtml(r)}</li>`).join('')}
        </ul>
        <div class="saving">💰 預估每月可省 NT$${p.estimatedMonthlySaving}</div>
        <div class="actions">
          <button class="btn-confirm" data-action="confirm" data-idx="${i}">✅ 確認暫停</button>
          <button class="btn-skip" data-action="skip" data-idx="${i}">略過</button>
        </div>
      </div>
    `).join('');

    // bind buttons
    window._proposals = data.proposals;
    document.querySelectorAll('.btn-confirm').forEach(b => b.onclick = e => doConfirm(Number(e.target.dataset.idx)));
    document.querySelectorAll('.btn-skip').forEach(b => b.onclick = e => doSkip(Number(e.target.dataset.idx)));
  } catch (err) {
    status.innerHTML = '❌ 掃描失敗：' + escapeHtml(err.message);
  } finally {
    btn.disabled = false;
  }
}

async function doConfirm(idx) {
  const p = window._proposals[idx];
  if (\!p) return;
  if (\!confirm(`確認暫停廣告：\n${p.adName}\n\n暫停後可在 Meta Ads Manager 重新啟用。`)) return;
  const card = document.querySelector(`.ad-card[data-ad="${p.adId}"]`);
  const confirmBtn = card.querySelector('.btn-confirm');
  confirmBtn.disabled = true;
  confirmBtn.textContent = '⏳ 暫停中...';
  try {
    const res = await fetch('/api/optimize/execute-pause', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        adId: p.adId,
        adName: p.adName,
        reason: p.reasons.join('；'),
        confirmed: true,
      }),
    });
    const d = await res.json();
    if (d.ok) {
      card.classList.add('done');
      card.querySelector('.actions').innerHTML = '<div style="text-align:center;color:var(--gold);font-size:13px;padding:6px;">✅ 已暫停</div>';
      toast(`✅ 已暫停：${p.adName}`);
      loadLog();
    } else {
      throw new Error(d.error || 'unknown');
    }
  } catch (err) {
    confirmBtn.disabled = false;
    confirmBtn.textContent = '✅ 確認暫停';
    toast('❌ 失敗：' + err.message, 5000);
  }
}

function doSkip(idx) {
  const p = window._proposals[idx];
  if (\!p) return;
  const card = document.querySelector(`.ad-card[data-ad="${p.adId}"]`);
  if (card) card.remove();
  toast(`已略過：${p.adName}`);
}

async function loadLog() {
  try {
    const res = await fetch('/api/optimize/actions');
    const arr = await res.json();
    const ll = $('log-list');
    if (\!arr.length) {
      ll.innerHTML = '<div class="empty" style="padding:20px;">尚無紀錄</div>';
      return;
    }
    ll.innerHTML = arr.slice(0, 20).map(a => `
      <div class="log-item ${a.success ? 'ok' : 'fail'}">
        <span>${a.success ? '✅' : '❌'} ${escapeHtml(a.type)} · ${escapeHtml(a.adName || a.adId)}</span>
        <span>${new Date(a.createdAt).toLocaleString('zh-TW')}</span>
      </div>
    `).join('');
  } catch (e) {}
}

$('scan-btn').onclick = scan;
loadLog();
</script>
</body>
</html>
