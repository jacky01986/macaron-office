<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<title>AI 教研團隊 — MACARON DE LUXE</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root { --brand:#6B4226; --bg:#FAF7F2; --ink:#3B2A1F; --line:#E5DACB; --accent:#F5A623; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--ink); margin: 0; padding: 16px; padding-bottom: 80px; }
  h1 { font-size: 22px; margin: 0 0 4px; color: var(--brand); }
  .subtitle { color: #888; margin-bottom: 20px; font-size: 14px; }
  .card { background: white; border: 1px solid var(--line); border-radius: 12px; padding: 18px; margin-bottom: 16px; }
  .card h2 { font-size: 16px; margin: 0 0 12px; color: var(--brand); }
  .team-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .team-card { background: #FFF8EE; border: 1px solid var(--line); border-radius: 8px; padding: 10px; }
  .team-card .name { font-weight: bold; color: var(--brand); }
  .team-card .role { font-size: 12px; color: #888; }
  .team-card .status { font-size: 11px; margin-top: 4px; }
  .month-row { padding: 12px; border: 1px solid var(--line); border-radius: 8px; margin-bottom: 8px; cursor: pointer; }
  .month-row:hover { background: #FFF8EE; }
  .month-key { font-weight: bold; color: var(--brand); }
  .theme-text { font-size: 14px; margin: 4px 0; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; margin-left: 6px; }
  .b-planned { background: #FFF4E0; color: var(--accent); }
  .b-ready { background: #e8f5e9; color: #4CAF50; }
  .lesson-section { margin: 12px 0; padding: 12px; background: #f9f5ef; border-left: 3px solid var(--brand); border-radius: 4px; }
  .lesson-section h3 { margin: 0 0 6px; font-size: 14px; color: var(--brand); }
  .lines { white-space: pre-wrap; font-size: 13px; line-height: 1.6; }
  .footer-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid var(--line); padding: 10px 16px; display: flex; justify-content: space-around; font-size: 12px; }
  .footer-nav a { color: var(--brand); text-decoration: none; padding: 4px 12px; }
  .run-btn { background: var(--brand); color: white; border: none; padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; margin-top: 8px; }
  .run-btn:disabled { background: #aaa; }
  .empty { color: #999; font-size: 13px; padding: 20px; text-align: center; }
</style>
</head>
<body>

<h1>📚 AI 教研團隊</h1>
<p class="subtitle">訂閱內容自動產出 — NORA 規劃 → YUKI 寫稿 → 你拍片</p>

<div class="card">
  <h2>👥 團隊狀態</h2>
  <div class="team-grid">
    <div class="team-card">
      <div class="name">📖 NORA</div>
      <div class="role">訂閱內容主編 · Opus 4.6</div>
      <div class="status">每月 1 號 09:00 規劃下月</div>
      <button class="run-btn" onclick="run('nora')">🚀 立刻執行</button>
    </div>
    <div class="team-card">
      <div class="name">✏️ YUKI</div>
      <div class="role">教學腳本撰寫 · Sonnet 4.6</div>
      <div class="status">每月 5 號 09:00 寫本月</div>
      <button class="run-btn" onclick="run('yuki')">🚀 立刻執行</button>
    </div>
    <div class="team-card" style="opacity: 0.5;">
      <div class="name">🎬 RIO</div>
      <div class="role">影片製作助理 — 拍攝腳本</div>
      <div class="status">每月 7 號 09:00 自動寫</div>
      <button class="run-btn" onclick="run('rio')">🚀 立刻執行</button>
    </div>
    <div class="team-card" style="opacity: 0.5;">
      <div class="name">💬 MIKA</div>
      <div class="role">學員社群輔導 — 答疑 + 週話題</div>
      <div class="status">每週一 09:30 寫週話題</div>
      <button class="run-btn" onclick="run('mika-topic')">🚀 寫週話題</button>
    </div>
  </div>
</div>

<div class="card">
  <h2>📅 月份產出</h2>
  <div id="monthsList"><div class="empty">載入中...</div></div>
</div>

<div class="card" id="detailCard" style="display:none;">
  <h2 id="detailTitle">主題詳細</h2>
  <div id="detailBody"></div>
</div>

<div class="footer-nav">
  <a href="/">← 主辦公室</a>
  <a href="/conversion.html">💰 成交記錄</a>
  <a href="/switcher.html">🔄 Meta 切換器</a>
</div>

<script>
async function run(role) {
  if (!confirm('立刻執行 ' + role.toUpperCase() + '？（約 30 秒，會吃 Claude API quota）')) return;
  try {
    const res = await fetch('/api/ai-team/run/' + role, { method: 'POST' });
    const j = await res.json();
    if (j.ok) {
      alert('✅ ' + role.toUpperCase() + ' 完成');
      load();
    } else {
      alert('⚠️ 失敗：' + (j.error || j.reason || '未知'));
    }
  } catch (e) { alert('❌ ' + e.message); }
}

async function load() {
  try {
    const res = await fetch('/api/ai-team/months');
    const j = await res.json();
    const months = j.months || {};
    const keys = Object.keys(months).sort().reverse();
    const el = document.getElementById('monthsList');
    if (keys.length === 0) {
      el.innerHTML = '<div class="empty">還沒有產出。按 NORA「立刻執行」開始第一個月。</div>';
      return;
    }
    el.innerHTML = keys.map(k => {
      const m = months[k];
      const theme = m.plan?.theme || '（未規劃）';
      const statusBadge = m.lesson ? '<span class="badge b-ready">課文已完成</span>' : '<span class="badge b-planned">已規劃</span>';
      return '<div class="month-row" onclick="showDetail(\'' + k + '\')"><div class="month-key">' + k + '</div>' +
        '<div class="theme-text">🎯 ' + theme + statusBadge + '</div></div>';
    }).join('');
  } catch (e) {
    document.getElementById('monthsList').innerHTML = '<div class="empty" style="color:#c33;">載入失敗：' + e.message + '</div>';
  }
}

async function showDetail(monthKey) {
  try {
    const res = await fetch('/api/ai-team/content/' + monthKey);
    const j = await res.json();
    const m = j.month_data;
    if (!m) { alert('找不到資料'); return; }
    let html = '';
    if (m.plan) {
      html += '<div class="lesson-section"><h3>📖 NORA 規劃</h3>' +
        '<div><strong>主題：</strong>' + escape(m.plan.theme || '') + '</div>' +
        '<div><strong>理由：</strong>' + escape(m.plan.reasoning || '') + '</div>' +
        '<div><strong>子主題：</strong>' + (m.plan.subtopics || []).map(escape).join('、') + '</div>' +
        '<div><strong>產出：</strong>' + escape(m.plan.outcome || '') + '</div>' +
        '<div><strong>Tagline：</strong>' + escape(m.plan.tagline || '') + '</div></div>';
    }
    if (m.lesson) {
      html += '<div class="lesson-section"><h3>✏️ YUKI 教學腳本：' + escape(m.lesson.title || '') + '</h3>' +
        '<div><strong>時長：</strong>' + (m.lesson.duration_min || 0) + ' 分</div>' +
        '<div style="margin-top:8px;"><strong>開場：</strong><div class="lines">' + escape(m.lesson.intro || '') + '</div></div>';
      (m.lesson.sections || []).forEach((s, i) => {
        html += '<div style="margin-top:10px;padding:8px;background:white;border-radius:4px;"><strong>' + (i+1) + '. ' + escape(s.title || '') + '</strong>' +
          '<div class="lines">' + escape(s.lines || '') + '</div>' +
          (s.demo_cue ? '<div style="font-size:12px;color:#888;margin-top:4px;">🎬 ' + escape(s.demo_cue) + '</div>' : '') +
          '</div>';
      });
      html += '<div style="margin-top:10px;"><strong>學員作業：</strong>' + escape(m.lesson.assignment || '') + '</div></div>';
    }
    document.getElementById('detailTitle').textContent = monthKey + ' 詳細';
    document.getElementById('detailBody').innerHTML = html;
    document.getElementById('detailCard').style.display = 'block';
    document.getElementById('detailCard').scrollIntoView({ behavior: 'smooth' });
  } catch (e) {
    alert('載入失敗：' + e.message);
  }
}

function escape(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[c]));
}

load();
</script>
</body>
</html>
