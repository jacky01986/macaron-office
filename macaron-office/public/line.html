<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💬 LINE 客服中心 · MACARON DE LUXE</title>
<style>
  :root {
    --burgundy: #6D2E46; --burgundy-dark: #4A1F30;
    --gold: #B08D57; --gold-bright: #E8B54B;
    --ivory: #FCF6F5; --dark: #0E0A0C; --dark-2: #1A1416; --dark-3: #251D20;
    --muted: #8B7278; --amber: #E8B54B; --green: #6FBF7E; --red: #C76B6B;
    --line-green: #06C755;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--ivory); font-family: -apple-system, "PingFang TC", "Noto Sans TC", sans-serif; min-height: 100vh; padding: 20px; }
  .container { max-width: 1300px; margin: 0 auto; }
  .header { border-bottom: 1px solid var(--burgundy); padding-bottom: 16px; margin-bottom: 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .header h1 { font-family: Georgia, serif; font-size: 22px; color: var(--gold); letter-spacing: 2px; font-weight: normal; }
  .header .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .header a { color: var(--gold); text-decoration: none; font-size: 12px; padding: 6px 12px; border: 1px solid var(--burgundy); border-radius: 6px; }
  .header a:hover { background: var(--burgundy-dark); }

  .status-bar {
    display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
    padding: 12px 16px; background: var(--dark-2);
    border-radius: 10px; border-left: 3px solid var(--line-green);
    margin-bottom: 20px; font-size: 13px;
  }
  .status-bar .ok { color: var(--green); }
  .status-bar .fail { color: var(--red); }
  .status-bar code {
    background: var(--dark-3); color: var(--gold); padding: 3px 8px;
    border-radius: 4px; font-size: 11px; user-select: all; cursor: pointer;
    border: 1px solid var(--burgundy-dark);
  }
  .status-bar code:hover { background: var(--burgundy-dark); }

  .tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid var(--burgundy); }
  .tab {
    padding: 10px 18px; cursor: pointer;
    background: transparent; color: var(--muted);
    border: none; font-size: 14px; font-family: inherit;
    border-bottom: 2px solid transparent;
  }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
  .tab:hover { color: var(--ivory); }

  .panel { display: none; }
  .panel.active { display: block; }

  /* 對話 panel */
  .msg-layout { display: grid; grid-template-columns: 340px 1fr; gap: 14px; min-height: 500px; }
  .msg-list { background: var(--dark-2); border-radius: 10px; padding: 10px; border: 1px solid var(--burgundy-dark); max-height: 700px; overflow-y: auto; }
  .msg-item {
    padding: 10px 12px; border-radius: 8px;
    cursor: pointer; margin-bottom: 6px;
    border: 1px solid transparent;
  }
  .msg-item:hover { background: var(--dark-3); }
  .msg-item.active { background: var(--burgundy-dark); border-color: var(--gold); }
  .msg-item .name { font-size: 13px; color: var(--ivory); font-weight: 600; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center; }
  .msg-item .name .time { font-size: 10px; color: var(--muted); font-weight: normal; }
  .msg-item .preview { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .msg-item .badges { display: flex; gap: 4px; margin-top: 4px; }
  .badge {
    display: inline-block; padding: 1px 7px;
    font-size: 10px; border-radius: 10px;
    background: var(--burgundy); color: var(--gold);
  }
  .badge.replied { background: rgba(111,191,126,0.15); color: var(--green); }
  .badge.unread { background: var(--line-green); color: white; }

  .msg-detail { background: var(--dark-2); border-radius: 10px; padding: 20px; border: 1px solid var(--burgundy-dark); }
  .detail-empty { text-align: center; color: var(--muted); padding: 60px 20px; font-size: 13px; }
  .detail-head { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px dotted var(--burgundy-dark); }
  .detail-head .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--burgundy-dark) url('') center/cover; }
  .detail-head .info .nm { font-size: 14px; color: var(--gold); font-weight: 600; }
  .detail-head .info .t { font-size: 11px; color: var(--muted); }

  .customer-msg {
    background: var(--dark-3); padding: 14px 16px;
    border-radius: 12px 12px 12px 2px;
    margin-bottom: 14px; font-size: 14px; line-height: 1.7;
    max-width: 85%;
  }
  .ai-classification {
    display: inline-block; padding: 3px 10px;
    background: rgba(176,141,87,0.1); color: var(--gold);
    border-radius: 10px; font-size: 11px; margin-bottom: 10px;
  }
  .draft-section { margin-top: 14px; }
  .draft-section label { font-size: 11px; color: var(--muted); margin-bottom: 4px; display: block; }
  .draft-section textarea {
    width: 100%; min-height: 120px;
    background: var(--dark-3); border: 1px solid var(--burgundy-dark);
    color: var(--ivory); padding: 10px 12px; border-radius: 8px;
    font-size: 14px; line-height: 1.7; font-family: inherit;
    resize: vertical;
  }
  .draft-actions { margin-top: 10px; display: flex; gap: 8px; align-items: center; }
  .draft-actions .word-count { font-size: 11px; color: var(--muted); margin-right: auto; }
  .btn-send {
    padding: 9px 20px; background: var(--line-green); color: white;
    border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600;
  }
  .btn-send:hover { background: #05a548; }
  .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

  .replied-box {
    margin-top: 14px; padding: 14px;
    background: rgba(111,191,126,0.08); border-left: 3px solid var(--green);
    border-radius: 6px;
  }
  .replied-box .label { font-size: 11px; color: var(--green); margin-bottom: 6px; }
  .replied-box .txt { font-size: 13px; color: var(--ivory); line-height: 1.7; }

  /* 廣播 panel */
  .broadcast-form {
    background: var(--dark-2); padding: 18px; border-radius: 10px;
    border: 1px dashed var(--burgundy); margin-bottom: 16px;
  }
  .broadcast-form label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 4px; }
  .broadcast-form textarea {
    width: 100%; min-height: 80px;
    background: var(--dark-3); border: 1px solid var(--burgundy-dark);
    color: var(--ivory); padding: 10px; border-radius: 6px;
    font-size: 14px; font-family: inherit;
  }
  .broadcast-form .row { display: flex; gap: 10px; align-items: end; margin-top: 12px; flex-wrap: wrap; }
  .gen-btn {
    padding: 10px 20px; background: var(--burgundy); color: var(--gold);
    border: 1px solid var(--gold); border-radius: 6px;
    cursor: pointer; font-size: 14px; letter-spacing: 1px; font-family: Georgia, serif;
  }
  .gen-btn:hover { background: var(--burgundy-dark); }

  .bc-drafts { display: grid; gap: 12px; }
  .bc-card {
    background: var(--dark-2); border: 1px solid var(--burgundy-dark);
    border-radius: 10px; padding: 14px;
  }
  .bc-card .style { font-size: 12px; color: var(--gold); font-weight: 600; margin-bottom: 8px; }
  .attach-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; padding: 10px; background: rgba(176,141,87,0.05); border-radius: 8px; border: 1px solid rgba(176,141,87,0.15); }
  .attach-col label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 4px; }
  .attach-col .att-inp { width: 100%; padding: 7px 9px; background: #0d0a0b; border: 1px solid #3b2a33; color: var(--text); border-radius: 6px; font-size: 12px; }
  .attach-inline { display: flex; gap: 6px; align-items: center; }
  .btn-upload { padding: 7px 12px; background: var(--gold); color: #1a1416; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; white-space: nowrap; font-weight: 600; }
  .btn-upload:hover:not(:disabled) { background: #c9a470; }
  .btn-upload:disabled { opacity: 0.6; cursor: default; }
  .img-preview { margin-top: 4px; }
  .img-preview img { max-width: 100%; max-height: 120px; border-radius: 6px; border: 1px solid #3b2a33; }
  @media (max-width: 640px) { .attach-row { grid-template-columns: 1fr; } }
  .bc-card textarea {
    width: 100%; min-height: 110px;
    background: var(--dark-3); border: 1px solid var(--burgundy-dark);
    color: var(--ivory); padding: 10px; border-radius: 6px;
    font-size: 13px; line-height: 1.7; font-family: inherit;
    margin-bottom: 8px;
  }
  .bc-card .actions { display: flex; gap: 8px; align-items: center; }
  .bc-card .count { font-size: 11px; color: var(--muted); margin-right: auto; }
  .btn-broadcast {
    padding: 8px 16px; background: var(--line-green); color: white;
    border: none; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: 600;
  }

  .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; background: var(--dark-2); border-radius: 10px; }

  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--burgundy); color: var(--ivory); padding: 12px 18px; border-radius: 6px; border: 1px solid var(--gold); font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; max-width: 80vw; z-index: 9999; }
  .toast.show { opacity: 1; }

  @media (max-width: 900px) {
    .msg-layout { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>💬 LINE 客服中心</h1>
      <div class="sub">收到訊息 → AI 分類 + 寫草稿 → 你編輯確認 → 送出</div>
    </div>
    <a href="/">← 主辦公室</a>
    <a href="/optimize.html">⚡ 廣告體檢</a>
    <a href="/social.html">📱 FB/IG</a>
  </div>

  <div id="status-bar" class="status-bar">檢查 LINE 狀態中...</div>

  <div class="tabs">
    <button class="tab active" data-tab="msgs">💬 客人訊息</button>
    <button class="tab" data-tab="broadcast">📣 群發廣播</button>
  </div>

  <div id="panel-msgs" class="panel active">
    <div class="msg-layout">
      <div id="msg-list" class="msg-list">
        <div class="empty" style="padding:20px;">載入中...</div>
      </div>
      <div id="msg-detail" class="msg-detail">
        <div class="detail-empty">👈 選一則訊息開始回覆<br><br>客人傳 LINE 過來後，AI 會自動分類 + 寫草稿，你看著改就好。</div>
      </div>
    </div>
  </div>

  <div id="panel-broadcast" class="panel">
    <div class="broadcast-form">
      <label>Brief（想廣播什麼內容，NOVA 會寫 3 個版本讓你挑）</label>
      <textarea id="bc-brief" placeholder="例：母親節限定 6 入禮盒 NT$880 開賣，前 50 名送玫瑰香氛小卡..."></textarea>
      <div class="row">
        <button id="bc-gen-btn" class="gen-btn">✏️ NOVA 寫草稿</button>
      </div>
    </div>
    <div id="bc-status" style="font-size:12px;color:var(--muted);margin-bottom:12px;"></div>
    <div id="bc-drafts" class="bc-drafts"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const $ = id => document.getElementById(id);
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])
  );
}
function fmtDate(iso) {
  if (!iso) return '-';
  try {
    const d = new Date(iso);
    return d.toLocaleString('zh-TW', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  } catch (e) { return iso; }
}
function toast(msg, ms = 3000) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), ms);
}

const INTENT_LABELS = {
  price: '💰 詢價',
  pickup: '🚚 取貨/運送',
  storage: '🧊 保存/保鮮',
  gifting: '🎁 送禮諮詢',
  complaint: '⚠️ 抱怨',
  product: '🧁 產品問題',
  other: '💬 其他',
};

let selectedId = null;
let messages = [];

async function loadStatus() {
  try {
    const r = await fetch('/api/line/status');
    const d = await r.json();
    const bar = $('status-bar');
    if (d.tokenSet) {
      bar.innerHTML = `<span class="ok">✅ LINE Token 已設定</span>
        <span>Webhook URL（設到 LINE Developers → Messaging API）：</span>
        <code onclick="navigator.clipboard.writeText(this.textContent);toast('已複製');">${escapeHtml(d.webhookUrl)}</code>`;
    } else {
      bar.innerHTML = `<span class="fail">❌ LINE_CHANNEL_ACCESS_TOKEN 或 LINE_CHANNEL_SECRET 尚未設定</span>
        <span style="color:var(--muted);">請到 Render env vars 加上這兩個值</span>`;
    }
  } catch (e) {}
}

async function loadMessages() {
  try {
    const r = await fetch('/api/line/messages');
    messages = await r.json();
    renderList();
  } catch (e) {
    $('msg-list').innerHTML = '<div class="empty" style="padding:20px;">載入失敗：' + escapeHtml(e.message) + '</div>';
  }
}

function renderList() {
  const list = $('msg-list');
  if (!messages.length) {
    list.innerHTML = '<div class="empty" style="padding:20px;">還沒收到任何訊息。<br><br>LINE webhook 設好後，客人傳訊息會出現在這裡。</div>';
    return;
  }
  list.innerHTML = messages.map(m => `
    <div class="msg-item ${m.id === selectedId ? 'active' : ''}" data-id="${escapeHtml(m.id)}">
      <div class="name">
        ${escapeHtml(m.userName || '(匿名用戶)')}
        <span class="time">${fmtDate(m.timestamp)}</span>
      </div>
      <div class="preview">${escapeHtml(m.text.slice(0, 40))}${m.text.length > 40 ? '...' : ''}</div>
      <div class="badges">
        ${m.classification ? `<span class="badge">${INTENT_LABELS[m.classification] || m.classification}</span>` : ''}
        ${m.replied ? '<span class="badge replied">✅ 已回</span>' : '<span class="badge unread">待回</span>'}
      </div>
    </div>
  `).join('');
  list.querySelectorAll('.msg-item').forEach(el => {
    el.onclick = () => selectMessage(el.dataset.id);
  });
}

function selectMessage(id) {
  selectedId = id;
  renderList();
  const m = messages.find(x => x.id === id);
  if (!m) return;
  const detail = $('msg-detail');
  const avatarStyle = m.userPic ? `background-image:url('${escapeHtml(m.userPic)}');` : '';
  detail.innerHTML = `
    <div class="detail-head">
      <div class="avatar" style="${avatarStyle}"></div>
      <div class="info">
        <div class="nm">${escapeHtml(m.userName || '(匿名用戶)')}</div>
        <div class="t">${fmtDate(m.timestamp)}</div>
      </div>
    </div>
    ${m.classification ? `<div class="ai-classification">AI 判斷：${INTENT_LABELS[m.classification] || m.classification}</div>` : ''}
    <div class="customer-msg">${escapeHtml(m.text)}</div>
    ${m.replied ? `
      <div class="replied-box">
        <div class="label">✅ 你已回覆 · ${fmtDate(m.repliedAt)} · 方式: ${escapeHtml(m.replyMethod || 'reply')}</div>
        <div class="txt">${escapeHtml(m.replyText || '')}</div>
      </div>
    ` : `
      <div class="draft-section">
        <label>✏️ AI 建議回覆（你可以修改）</label>
        <textarea id="reply-input" placeholder="...">${escapeHtml(m.draft || '')}</textarea>
        <div class="attach-row">
          <div class="attach-col">
            <label>🖼️ 圖片（貼 URL 或上傳，JPG/PNG ≤10MB）</label>
            <div class="attach-inline">
              <input type="text" id="reply-img-url" class="att-inp" placeholder="https://...">
              <button type="button" id="reply-upload-btn" class="btn-upload">📎 上傳</button>
              <input type="file" id="reply-img-file" accept="image/*" style="display:none">
            </div>
            <div id="reply-img-preview" class="img-preview"></div>
          </div>
          <div class="attach-col">
            <label>🔗 連結 URL（可選）</label>
            <input type="text" id="reply-link-url" class="att-inp" placeholder="https://...">
            <label style="margin-top:6px">按鈕文字（最多 20 字）</label>
            <input type="text" id="reply-link-label" class="att-inp" placeholder="查看詳情" maxlength="20">
          </div>
        </div>
        <div class="draft-actions">
          <span class="word-count" id="reply-count">${(m.draft || '').length} 字</span>
          <button class="btn-send" id="reply-btn">📤 送出</button>
        </div>
      </div>
    `}
  `;
  if (!m.replied) {
    const inp = $('reply-input');
    const cnt = $('reply-count');
    inp.addEventListener('input', () => cnt.textContent = inp.value.length + ' 字');
    $('reply-btn').onclick = () => doReply(id);
    $('reply-upload-btn').onclick = () => $('reply-img-file').click();
    $('reply-img-file').addEventListener('change', async (e) => {
      const f = e.target.files[0]; if (!f) return;
      const btn = $('reply-upload-btn');
      btn.disabled = true; btn.textContent = '⏳ 上傳中...';
      try {
        const url = await uploadImage(f);
        $('reply-img-url').value = url;
        $('reply-img-preview').innerHTML = `<img src="${url}" style="max-height:120px;border-radius:6px;margin-top:4px">`;
        btn.textContent = '✅ 上傳完成';
        setTimeout(() => { btn.textContent = '📎 上傳'; btn.disabled = false; }, 2000);
      } catch (err) {
        btn.disabled = false; btn.textContent = '📎 上傳';
        toast('❌ 上傳失敗：' + err.message, 5000);
      }
    });
    $('reply-img-url').addEventListener('input', (e) => {
      const v = e.target.value.trim();
      $('reply-img-preview').innerHTML = v ? `<img src="${v}" style="max-height:120px;border-radius:6px;margin-top:4px" onerror="this.style.display=\'none\'">` : '';
    });
  }
}

// 上傳圖片 → 回傳公開 URL
async function uploadImage(file) {
  const fd = new FormData();
  fd.append('file', file);
  const r = await fetch('/api/line/upload', { method: 'POST', body: fd });
  const d = await r.json();
  if (!d.ok) throw new Error(d.error || '上傳失敗');
  return d.url;
}

async function doReply(id) {
  const text = $('reply-input').value.trim();
  const imageUrl = ($('reply-img-url')?.value || '').trim();
  const linkUrl = ($('reply-link-url')?.value || '').trim();
  const linkLabel = ($('reply-link-label')?.value || '').trim();
  if (!text && !imageUrl && !linkUrl) { toast('請輸入回覆內容、圖片或連結'); return; }
  if (linkUrl && !/^https?:\/\//i.test(linkUrl)) { toast('連結必須以 http:// 或 https:// 開頭'); return; }
  if (imageUrl && !/^https?:\/\//i.test(imageUrl)) { toast('圖片 URL 必須以 http:// 或 https:// 開頭'); return; }
  const btn = $('reply-btn');
  btn.disabled = true;
  btn.textContent = '⏳ 送出中...';
  try {
    const r = await fetch('/api/line/reply', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, text, imageUrl: imageUrl || undefined, linkUrl: linkUrl || undefined, linkLabel: linkLabel || undefined, confirmed: true }),
    });
    const d = await r.json();
    if (d.ok) {
      toast(`✅ 已送出 (${d.method})`);
      await loadMessages();
      selectMessage(id);
    } else {
      throw new Error(d.error || 'unknown');
    }
  } catch (err) {
    btn.disabled = false;
    btn.textContent = '📤 送出';
    toast('❌ ' + err.message, 5000);
  }
}

// 廣播
async function genBroadcast() {
  const brief = $('bc-brief').value.trim();
  if (!brief) { toast('請輸入 brief'); return; }
  $('bc-gen-btn').disabled = true;
  $('bc-status').textContent = '✏️ NOVA 思考中...';
  $('bc-drafts').innerHTML = '';
  try {
    const r = await fetch('/api/line/generate-broadcast', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ brief, count: 3 }),
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    $('bc-status').textContent = `✅ 產出 ${d.drafts.length} 版草稿，選一個送出`;
    $('bc-drafts').innerHTML = d.drafts.map((x, i) => `
      <div class="bc-card">
        <div class="style">${escapeHtml(x.style || '版本' + (i+1))}</div>
        <textarea class="bc-txt">${escapeHtml(x.text)}</textarea>
        <div class="attach-row">
          <div class="attach-col">
            <label>🖼️ 圖片</label>
            <div class="attach-inline">
              <input type="text" class="bc-img-url att-inp" placeholder="https://...">
              <button type="button" class="btn-upload bc-upload-btn">📎 上傳</button>
              <input type="file" accept="image/*" class="bc-img-file" style="display:none">
            </div>
            <div class="bc-img-preview img-preview"></div>
          </div>
          <div class="attach-col">
            <label>🔗 連結 URL</label>
            <input type="text" class="bc-link-url att-inp" placeholder="https://...">
            <label style="margin-top:6px">按鈕文字</label>
            <input type="text" class="bc-link-label att-inp" placeholder="查看詳情" maxlength="20">
          </div>
        </div>
        <div class="actions">
          <span class="count">${x.text.length} 字</span>
          <button class="btn-broadcast" data-idx="${i}">📣 廣播給全部好友</button>
        </div>
      </div>
    `).join('');
    document.querySelectorAll('.bc-txt').forEach(t => t.addEventListener('input', e => {
      e.target.closest('.bc-card').querySelector('.count').textContent = e.target.value.length + ' 字';
    }));
    document.querySelectorAll('.btn-broadcast').forEach(b => {
      b.onclick = () => doBroadcast(b);
    });
    document.querySelectorAll('.bc-upload-btn').forEach(b => {
      b.onclick = () => b.closest('.bc-card').querySelector('.bc-img-file').click();
    });
    document.querySelectorAll('.bc-img-file').forEach(fi => {
      fi.addEventListener('change', async (e) => {
        const f = e.target.files[0]; if (!f) return;
        const card = e.target.closest('.bc-card');
        const btn = card.querySelector('.bc-upload-btn');
        btn.disabled = true; btn.textContent = '⏳';
        try {
          const url = await uploadImage(f);
          card.querySelector('.bc-img-url').value = url;
          card.querySelector('.bc-img-preview').innerHTML = `<img src="${url}" style="max-height:120px;border-radius:6px;margin-top:4px">`;
          btn.textContent = '✅';
          setTimeout(() => { btn.textContent = '📎 上傳'; btn.disabled = false; }, 2000);
        } catch (err) {
          btn.disabled = false; btn.textContent = '📎 上傳';
          toast('❌ ' + err.message, 5000);
        }
      });
    });
    document.querySelectorAll('.bc-img-url').forEach(inp => {
      inp.addEventListener('input', (e) => {
        const v = e.target.value.trim();
        const prev = e.target.closest('.bc-card').querySelector('.bc-img-preview');
        prev.innerHTML = v ? `<img src="${v}" style="max-height:120px;border-radius:6px;margin-top:4px" onerror="this.style.display=\'none\'">` : '';
      });
    });
  } catch (err) {
    $('bc-status').textContent = '❌ ' + err.message;
  } finally {
    $('bc-gen-btn').disabled = false;
  }
}

async function doBroadcast(btn) {
  const card = btn.closest('.bc-card');
  const text = card.querySelector('.bc-txt').value.trim();
  const imageUrl = (card.querySelector('.bc-img-url')?.value || '').trim();
  const linkUrl = (card.querySelector('.bc-link-url')?.value || '').trim();
  const linkLabel = (card.querySelector('.bc-link-label')?.value || '').trim();
  if (!text && !imageUrl && !linkUrl) { toast('內容、圖片、連結要至少一個'); return; }
  if (linkUrl && !/^https?:\/\//i.test(linkUrl)) { toast('連結必須是 http/https'); return; }
  if (imageUrl && !/^https?:\/\//i.test(imageUrl)) { toast('圖片 URL 必須是 http/https'); return; }
  const summary = text + (imageUrl ? '\n[含圖片]' : '') + (linkUrl ? `\n[含連結按鈕：${linkLabel || '打開連結'}]` : '');
  if (!confirm(`確認廣播給全部 LINE 好友？\n\n${summary.slice(0, 300)}${summary.length > 300 ? '...' : ''}\n\n⚠️ 廣播會計入月額度，發出後無法撤回。`)) return;
  btn.disabled = true;
  btn.textContent = '⏳ 廣播中...';
  try {
    const r = await fetch('/api/line/broadcast', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, imageUrl: imageUrl || undefined, linkUrl: linkUrl || undefined, linkLabel: linkLabel || undefined, confirmed: true }),
    });
    const d = await r.json();
    if (d.ok) {
      btn.textContent = '✅ 已廣播';
      toast('✅ 廣播已送出');
    } else {
      throw new Error(d.error || 'unknown');
    }
  } catch (err) {
    btn.disabled = false;
    btn.textContent = '📣 廣播給全部好友';
    toast('❌ ' + err.message, 5000);
  }
}

document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    $('panel-' + t.dataset.tab).classList.add('active');
  };
});
$('bc-gen-btn').onclick = genBroadcast;

loadStatus();
loadMessages();
setInterval(loadMessages, 15000); // 每 15 秒 poll 新訊息
</script>
</body>
</html>
